var lastKeyTime = 0;
document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT") return;
    var k = e.key.toLowerCase();
    var now = Date.now();
    if (now - lastKeyTime < 50) return;
    lastKeyTime = now;
    if (k === "a" || k === "p" || k === "u" || k === "n") e.preventDefault();
    if (!G.etaper || !G.etaper.length) return;
    var eType = G.etaper[G.enr] ? G.etaper[G.enr].type : "flad";
    if (k === "a") { if (eType === "tt") accTT(); else accel(); }
    else if (k === "p") { pause(); }
    else if (k === "u" && G.vent && G.udata) { accUdb(); }
    else if (k === "n" && G.vent && G.udata) { rejUdb(); }
});

function vaelgSvaerhed(niveau) {
    G.svaerhed = niveau;
    rytterInfo(G.spiller.hold, { n: G.spiller.orig });
}

function rerollRytter() {
    if (G.rerollsLeft <= 0) return;
    G.rerollsLeft--;
    
    var hn = Object.keys(TEAMS);
    var holdNavn = hn[ri(0, hn.length-1)];
    var hd = TEAMS[holdNavn];
    var ridx = ri(4, Math.min(hd.r.length - 1, 11));
    var rd = hd.r[ridx];
    
    G.spiller = {
        navn: G.navn,
        orig: rd.n,
        hold: holdNavn,
        holdAbbr: hd.abbr,
        holdClr: hd.clr,
        sp: true,
        gc: rd.gc + ri(-2,2),
        bj: rd.bj + ri(-2,2),
        spr: rd.sp + ri(-2,2),
        tt: rd.tt + ri(-2,2),
        ud: rd.ud + ri(-2,2),
        re: rd.re + ri(-2,2),
        fl: rd.fl + ri(-2,2),
        energi: 100, stid: 0, gi: 0, ude: false
    };
    
    rytterInfo(holdNavn, rd);
}

function genererResume(res, erTT, udeRyttere) {
    var gt = getGT();
	var e = G.etaper[G.enr];
    var vinder = res[0] ? res[0].r : null;
    var spiEfternavn = G.navn.split(" ").pop();
    var spiRes = null;
    var spiPlads = -1;
    
    for (var i = 0; i < res.length; i++) {
        if (res[i].r.sp) {
            spiRes = res[i];
            spiPlads = i + 1;
            break;
        }
    }
    
    // Hent klassement-data
    var aktive = G.ryttere.filter(function(r) { return !r.ude; });
    var gcS = aktive.slice().sort(function(a,b) { return a.stid - b.stid; });
    var spS = aktive.slice().sort(function(a,b) { return (G.sprPts[b.navn]||0) - (G.sprPts[a.navn]||0); });
    var bjS = aktive.slice().sort(function(a,b) { return (G.bjgPts[b.navn]||0) - (G.bjgPts[a.navn]||0); });
    
    var gcLeder = gcS[0];
    var spLeder = spS[0];
    var bjLeder = bjS[0];
    
    // Find forrige etapes trøjebærere fra ETAPE_HISTORIK
    // gemEtapeHistorik() er allerede kaldt FØR genererResume(),
    // så den SIDSTE entry i ETAPE_HISTORIK er DENNE etape.
    // Vi skal bruge den NÆSTSIDSTE for "forrige etape".
    var tidligereGcLeder = null;
    var tidligereSpLeder = null;
    var tidligereBjLeder = null;
    if (ETAPE_HISTORIK.length >= 2) {
        var forrige = ETAPE_HISTORIK[ETAPE_HISTORIK.length - 2];
        tidligereGcLeder = forrige.gcLeder;
        tidligereSpLeder = forrige.spLeder;
        tidligereBjLeder = forrige.bjLeder;
    }
    var erFoersteEtape = (ETAPE_HISTORIK.length <= 1);
	var alleredeNaevnteKollaps = {};

// ===== BEREGN GC-FØR / EFTER =====
    var spiGC = -1;
    for (var i = 0; i < gcS.length; i++) {
        if (gcS[i].sp) { spiGC = i; break; }
    }

    // Hent forrige etapes GC-placering fra historik
    var spiGCFoer = -1;
    if (ETAPE_HISTORIK.length >= 2) {
        spiGCFoer = ETAPE_HISTORIK[ETAPE_HISTORIK.length - 2].spiGCPlads;
    } else {
        spiGCFoer = spiGC + 1;
    }

    var placeringAendring = spiGCFoer - (spiGC + 1);
    var erGcLeder = (spiGC === 0);
    var varGcLeder = (spiGCFoer === 1);

    // Beregn GC-gab ændring robust via historik
    // gcGabNu = spillerens tid til GC-leder NU (positiv = bagud)
	var gcGabNu = (spiGC > 0) ? Math.round(G.spiller.stid - gcS[0].stid) : 0;    
	
    // gcGabFoer = spillerens tid til GC-leder FØR denne etape
    var gcGabFoer = 0;
    if (!erFoersteEtape && ETAPE_HISTORIK.length >= 2) {
        var forrigeHistorik = ETAPE_HISTORIK[ETAPE_HISTORIK.length - 2];
        // Find spillerens og lederens tider fra forrige etape
        if (forrigeHistorik.gcTop3 && forrigeHistorik.gcTop3.length > 0) {
            var lederTidFoer = forrigeHistorik.gcTop3[0].tid;
            // Find spillerens samlede tid FØR denne etape
            var spiEtapeTid = spiRes ? spiRes.tid : 0;
            var spiStidFoer = G.spiller.stid - spiEtapeTid;
            // Find hvem der var GC-leder før og deres tid før
            var forrigeLeder = forrigeHistorik.gcLeder;
            var forrigeLederStidFoer = lederTidFoer;
            
            if (forrigeHistorik.spiGCPlads === 1) {
                // Spilleren VAR leder - gabet var 0
                gcGabFoer = 0;
            } else {
                gcGabFoer = spiStidFoer - forrigeLederStidFoer;
            }
        }
    }
    
    var gcGabAendring = gcGabNu - gcGabFoer;
    
    // Sikkerhedscheck: Hvis spilleren rykkede OP i klassementet, 
    // men gcGabAendring siger han tabte tid, er beregningen forkert
    var gcGabPaalidelig = true;
    if (placeringAendring > 0 && gcGabAendring > 60) {
        // Spilleren rykkede op men beregningen siger tidstab - upålidelig
        gcGabPaalidelig = false;
    }
    if (placeringAendring < -3 && gcGabAendring < -60) {
        // Spilleren faldt mange pladser men beregningen siger tidsgevinst - upålidelig
        gcGabPaalidelig = false;
    }

// ===== BEREGN VINDERENS SITUATION =====
    // Vandt vinderen solo, i lille gruppe, eller i massespurt?
    var vinderDiff = (res.length >= 2) ? Math.round(res[1].tid - res[0].tid) : 0;
    var vinderVandtSolo = vinderDiff >= 5; // 5+ sekunder = solo
    var vinderErSprinter = vinder && vinder.spr > 85;
    var vinderErOverraskelse = vinder && vinder.spr < 75 && vinder.gc < 80;
    
    // Tæl hvor mange der kom ind på vinderens tid (inden for 3 sekunder)
    var vinderGruppeStr = 0;
    for (var i = 0; i < res.length; i++) {
        if (Math.round(res[i].tid - res[0].tid) <= 3) {
            vinderGruppeStr++;
        } else {
            break;
        }
    }
    // Find gap til næste gruppe (første rytter med > 3 sek forskel)
    var gapTilFelt = 0;
    if (vinderGruppeStr < res.length) {
        gapTilFelt = Math.round(res[vinderGruppeStr].tid - res[0].tid);
    }
    // Massespurt = stor gruppe (30+) kom ind sammen
    // Lille gruppe = under 30 ryttere med stort gap til resten
    var varMasseSpurt = vinderGruppeStr >= 30;
    var varLilleGruppe = !vinderVandtSolo && vinderGruppeStr < 30 && gapTilFelt >= 30;
    
    // Find hvornår vinderen stak af (sidste angreb fra vinderen)
    var vinderAngrebKm = -1;
    if (vinder && vinderVandtSolo) {
        for (var i = 0; i < HOEJDEPUNKTER.length; i++) {
            var h = HOEJDEPUNKTER[i];
            if (h.type === "angreb" && h.data.rytter === vinder.navn) {
                vinderAngrebKm = Math.round(h.km);
            }
        }
    }
    // Find hvornår spilleren stak af (til solo-finish tekst)
    var spillerAngrebKm = -1;
    if (vinder && vinder.sp && vinderVandtSolo) {
        for (var i = 0; i < HOEJDEPUNKTER.length; i++) {
            var h = HOEJDEPUNKTER[i];
            if (h.type === "angreb" && h.data.rytter === G.spiller.navn) {
                spillerAngrebKm = Math.round(h.km);
            }
        }
    }
    
    // ===== KATEGORISER HØJDEPUNKTER =====
    var angreb = HOEJDEPUNKTER.filter(function(h) { return h.type === "angreb"; });
    var gcKollaps = HOEJDEPUNKTER.filter(function(h) { return h.type === "gc_kollaps"; });
    var daarligeDage = HOEJDEPUNKTER.filter(function(h) { return h.type === "daarlig_dag"; });
    var udbrud = HOEJDEPUNKTER.filter(function(h) { return h.type === "udbrud"; });
    var sprints = HOEJDEPUNKTER.filter(function(h) { return h.type === "sprint"; });
    var bjerge = HOEJDEPUNKTER.filter(function(h) { return h.type === "bjerg"; });
    var indhentninger = HOEJDEPUNKTER.filter(function(h) { return h.type === "indhent"; });

    var spillerKollapsEvent = null;
    for (var i = 0; i < gcKollaps.length; i++) {
        if (gcKollaps[i].data.rytter === G.spiller.navn) {
            spillerKollapsEvent = gcKollaps[i];
            break;
        }
    }
    
    // ===== FIND VIGTIGSTE KOLLAPS TIL OVERSKRIFT =====
var vigtigsteKollaps = null;
    var vigtigsteKollapsNavn = "";
    
    var gulTroejeBaerer = tidligereGcLeder || (gcS[0] ? gcS[0].navn : null);
    var prioritetsNavne = [];
    if (gulTroejeBaerer) prioritetsNavne.push(gulTroejeBaerer);
    var superStjerner = ["Tadej Pogačar", "Jonas Vingegaard", "Remco Evenepoel", "Primož Roglič"];
    for (var si = 0; si < superStjerner.length; si++) {
        if (prioritetsNavne.indexOf(superStjerner[si]) < 0) prioritetsNavne.push(superStjerner[si]);
    }
    // Inkluder IKKE spilleren her - spillerens kollaps håndteres separat
    
    for (var pi = 0; pi < prioritetsNavne.length; pi++) {
        var pNavn = prioritetsNavne[pi];
        // Check at rytteren er i top 10 i GC
        var erITop10 = false;
        for (var gi = 0; gi < Math.min(10, gcS.length); gi++) {
            if (gcS[gi].navn === pNavn) { erITop10 = true; break; }
        }
        if (!erITop10) continue;
        
        for (var ki = 0; ki < gcKollaps.length; ki++) {
            if (gcKollaps[ki].data.rytter === pNavn) {
                vigtigsteKollaps = gcKollaps[ki];
                vigtigsteKollapsNavn = pNavn.split(" ").pop();
                break;

                        : "Det var en solid dag for " + spiEfternavn + " med en " + spiPlads + ". plads.";
                } else if (spiPlads <= 30) {
                    spiTekst = erTT
                        ? spiEfternavn + " kørte en jævn enkeltstart som nr. " + spiPlads + "."
                        : spiEfternavn + " fulgte favoritterne sikkert i mål som nr. " + spiPlads + ".";
                } else {
                    spiTekst = erTT
                        ? spiEfternavn + " sluttede som nr. " + spiPlads + " på enkeltstarten."
                        : spiEfternavn + " kom i mål med feltet.";
                }
                if (spiGC < 10 && !erFoersteEtape) {
                    spiTekst += " Han ligger nr. " + (spiGC + 1) + " i klassementet.";
                }
            }
        }
    }
    afsnit.push(spiTekst);

// STYRT
    var styrtEvents = HOEJDEPUNKTER.filter(function(h) { return h.type === "styrt"; });
    if (styrtEvents.length === 1) {
        var styrtNavn = styrtEvents[0].data.rytter.split(" ").pop();
        afsnit.push("Etapen blev også overskygget af et styrt, der kostede " + styrtNavn + " udgangen af Touren.");
    } else if (styrtEvents.length === 2) {
        var styrt1 = styrtEvents[0].data.rytter.split(" ").pop();
        var styrt2 = styrtEvents[1].data.rytter.split(" ").pop();
        afsnit.push("To ryttere måtte forlade Touren efter styrt: " + styrt1 + " og " + styrt2 + ".");
    }
	
    // UDGÅEDE RYTTERE
    if (udeRyttere && udeRyttere.length >= 5) {
        if (udeRyttere.length >= 20) {
            afsnit.push("Hele " + udeRyttere.length + " ryttere nåede ikke inden for tidsgrænsen og må forlade løbet. Feltet er fuldstændig decimeret.");
        } else if (udeRyttere.length >= 10) {
            afsnit.push("Det var en blodig dag for feltet. " + udeRyttere.length + " ryttere udgik efter ikke at nå inden for tidsgrænsen.");
        } else {
            afsnit.push(udeRyttere.length + " ryttere nåede ikke inden for tidsgrænsen og må forlade Touren.");
        }
    }
    
    // FREMADSKUENDE
    if (G.enr < 20) {
        var nesteE = G.etaper[G.enr + 1];
        var fremTekst = "";
        if (nesteE.type === "bjerg") {
            var bjergFrem = [
                "I morgen venter en brutal bjergetape til " + nesteE.slut + ". Der kan ske store ting i klassementet.",
                "Morgendagens bjergetape til " + nesteE.slut + " bliver afgørende for klassementet.",
                "Favoritterne vil teste hinanden på morgendagens bjergetape."
            ];
            fremTekst = bjergFrem[ri(0, bjergFrem.length - 1)];
        } else if (nesteE.type === "tt") {
            fremTekst = "Næste etape er en enkeltstart – sandhedens time for klassementrytterne.";
        } else if (nesteE.type === "kuperet") {
            fremTekst = "I morgen fortsætter Touren med en kuperet etape til " + nesteE.slut + ".";
        } else {
            var fladFrem = [
                "Sprinterne vil lugte blod på morgendagens flade etape til " + nesteE.slut + ".",
                "Morgendagens flade etape til " + nesteE.slut + " burde ende i en massespurt.",
                "Sprinterholdene vil kontrollere morgendagens flade etape."
            ];
            fremTekst = fladFrem[ri(0, fladFrem.length - 1)];
        }
        afsnit.push(fremTekst);
    }
    
    var rensetAfsnit = [];
    for (var i = 0; i < afsnit.length; i++) {
        if (afsnit[i] && afsnit[i].trim() !== "") rensetAfsnit.push(afsnit[i]);
    }
    
    return {
        overskrift: overskrift,
        tekst: rensetAfsnit.join("\n\n")
    };
}

function startNorm() {
    var aktiveRyttere = G.ryttere.filter(function(r) { return !r.ude; });
    G.grp = [{ type: "felt", navn: "Feltet", ryt: aktiveRyttere, pos: 0, tf: 0 }];
    if (G.iv) clearInterval(G.iv);
    G.iv = setInterval(loop, 400);
    rend();
}

function loop() {
    if (G.vent) return;
    if (G.etapeSlut) return;   // ← kør aldrig videre efter mål

    // Rens grupper for udgåede ryttere
    rensGrupper();   

    var e = G.etaper[G.enr];
    var info = ETYPER[e.type];   

    var ki = Math.min(Math.floor(G.km), G.profil.length - 1);
    var stig = (G.profil[Math.min(ki+1, G.profil.length-1)] || 0) - (G.profil[ki] || 0);

    // Energitab - meget mere på stigninger, lidt mindre på fald
    var hf = 1.0;
    if (stig > 0) {
        // Op ad bakke - eksponentielt hårdere jo stejlere
        hf = 1.2 + stig * 0.015 + (stig * stig) * 0.0002;
    } else if (stig < 0) {
        // Ned ad bakke - man restituerer lidt
        hf = 0.4 + (stig * 0.01); // stig er negativ, så dette reducerer hf
        hf = Math.max(0.1, hf); // Kan komme ned til 10% energitab (næsten hvile)
    }

    for (var i = 0; i < G.ryttere.length; i++) {
        var r = G.ryttere[i];
        if (r.ude) continue;
        
        var uf = (100 - r.ud) / 100;
        var baseTab = info.enrg * hf * (1.4 + uf * 0.6); // Øget base fra 1.2 til 1.4
        
        if (e.type === "bjerg") {
            // I bjerge er klatreevne MEGET vigtig
            var klatreEffektivitet = r.bj / 100;
            if (stig > 0) {
                // Op ad: Dårlige klatrere lider MEGET mere
                baseTab *= (1.8 - klatreEffektivitet * 0.9) * 0.8;
                // Ekstra hårdt på stejle stigninger
                if (stig > 25) {
                    baseTab *= 1.4 * 0.8;
                } else if (stig > 15) {
                    baseTab *= 1.2 * 0.8;
                }
            } else if (stig < -5) {
                // Ned ad: Alle restituerer - gode klatrere lidt mere
                var restitution = 0.03 + klatreEffektivitet * 0.02;
                r.energi = Math.min(getMaxEnergi(r), r.energi + restitution);
                baseTab *= 0.3; // Meget lavt energitab ned ad
            } else {
                // Fladt/let terræn på bjergetape: dårligt tempo straffes lidt, godt tempo hjælper en smule
                var fl = r.fl;
                var faktor;
            
                if (fl < 50) {
                    // Meget dårlig tempo: +10% til +18% tab
                    faktor = 1.10 + (50 - fl) * 0.004;   // fl=40 → 1.14, fl=30 → 1.18
                } else if (fl < 70) {
                    // Under middel: op til +10%
                    faktor = 1.00 + (70 - fl) * 0.005;   // fl=60 → 1.05, fl=50 → 1.10
                } else if (fl <= 85) {
                    // God tempo: svagt mindre tab
                    faktor = 0.99 + (85 - fl) * 0.001;   // fl=85 → 0.99, fl=75 → 1.0, fl=70 → 1.0
                } else {
                    // Meget høj tempo: lille bonus
                    faktor = 0.96;                       // ca. 4% mindre tab
                }
            
                baseTab *= faktor;
            }

        } else if (e.type === "kuperet") {
            var klatreEffektivitet = (r.bj * 0.6 + r.fl * 0.4) / 100;
            if (stig > 0) {
                baseTab *= (1.5 - klatreEffektivitet * 0.6);
            } else if (stig < -5) {
                // Lidt restitution ned ad bakke
                var restitution = 0.02 + klatreEffektivitet * 0.01;
                r.energi = Math.min(getMaxEnergi(r), r.energi + restitution);
                baseTab *= 0.5;
            }
        } else if (e.type === "flad") {
            // Flad: tempo < 70 straffes, tempo omkring 70-80 er neutral, meget højt tempo giver lidt rabat
            var fl = r.fl;
            var faktor;
        
            if (fl < 50) {
                // Meget dårlig tempo: +15% til +25% energitab
                faktor = 1.15 + (50 - fl) * 0.005;   // fl=40 → 1.20, fl=30 → 1.25
            } else if (fl < 70) {
                // Under middel: +0% til +15%
                faktor = 1.00 + (70 - fl) * 0.0075;  // fl=60 → 1.075, fl=50 → 1.15
            } else if (fl <= 85) {
                // God tempo: tæt på neutral
                faktor = 0.98 + (85 - fl) * 0.001;   // fl=85 → 0.98, fl=75 → 0.99, fl=70 → 1.0
            } else {
                // Meget høj tempo: lille bonus
                faktor = 0.95;                       // fl>85 → 5% mindre tab
            }
        
            baseTab *= faktor;
        }

        
        // Ekstra straf for MEGET stejle stigninger (HC-bjerge)
        if (stig > 40) {
            baseTab *= 1.5;
        } else if (stig > 30) {
            baseTab *= 1.3;
        }
        
        r.energi = Math.max(0, r.energi - baseTab);
    }

// Udkørte
    for (var i = 0; i < G.ryttere.length; i++) {
        var r = G.ryttere[i];
        if (r.ude) continue;
        if (r.energi <= 1) {
            var rg = findInArr(G.grp, function(g) { return g.ryt.indexOf(r) >= 0; });
            if (rg && rg.type !== "gruppetto") {
                if (r.sp) G.msg = "💀 Du er udkørt!";
                // Log ægte kollaps (energi=0) med korrekt km
                // Brug spillerens/rytterens gruppes position, ikke G.km
                var kollapsKm = rg ? Math.round(rg.pos) : Math.round(G.km);
                logHoejdepunkt("gc_kollaps", { 
                    rytter: r.navn, 
                    km: kollapsKm, 
                    gc: r.gc, 
                    energiKollaps: true  // Markér som ægte energi-kollaps
                });
                flytTilGruppetto(r);
            }
        }
    }
    
// Opdater grupper
for (var gi = 0; gi < G.grp.length; gi++) {
    var g = G.grp[gi];
    var spd = 1.0;
    var grpSize = g.ryt.length;
    
    // Beregn gennemsnitlig styrke i gruppen
    var grpStyrke = 0;
    for (var ri3 = 0; ri3 < g.ryt.length; ri3++) {
        var rr = g.ryt[ri3];
        if (e.type === "bjerg") {
            grpStyrke += rr.bj * 0.7 + rr.energi * 0.3;
        } else if (e.type === "kuperet") {
            grpStyrke += rr.bj * 0.4 + rr.fl * 0.3 + rr.energi * 0.3;
        } else {
            grpStyrke += rr.fl * 0.5 + rr.energi * 0.3 + rr.ud * 0.2;
        }
    }
    grpStyrke = grpSize > 0 ? grpStyrke / grpSize : 50;
    
    // Gruppefordel - afhænger af etapetype og gruppestørrelse
    // Stor fordel på flade etaper, lille fordel i bjerge
    var grpSizeBonus = 0;
    if (grpSize >= 2) {
        var maxBonus = e.type === "flad" ? 0.08 : e.type === "kuperet" ? 0.05 : 0.02;
        // Logaritmisk kurve: Stor gevinst ved første ryttere, aftager derefter
        grpSizeBonus = maxBonus * Math.min(Math.log(grpSize) / Math.log(30), 1);
    }
    
    if (g.type === "felt") {
        spd += grpSizeBonus;
        // Reducer feltets hastighedsbonus - nemmere at holde hjem på kuperet end flad
        if (e.type === "kuperet") {
            spd *= (2 - info.felt) * 0.80; // Feltet kører langsommere på kuperet
        } else if (e.type === "flad") {
            spd *= (2 - info.felt) * 0.95; // Feltet kører næsten normalt på flad
        } else {
            spd *= (2 - info.felt);
        }
        // Feltet kører mere stabilt
        spd += (grpStyrke - 70) * 0.0008;
    } else if (g.type === "udbrud") {
        // Udbrud får også gruppefordel, men mindre end felt
        spd += grpSizeBonus * 0.7;
        
        var udbBonus = 0.02;
        if (e.type === "bjerg") {
            // I bjerge afhænger hastighed MEGET af klatrestyrke
            udbBonus = 0.03 + (grpStyrke - 70) * 0.002;
            // Stærke klatrere i udbrud kører hurtigere op ad
            if (stig > 10) {
                udbBonus += (grpStyrke - 75) * 0.0015;
            }
            // Solo eller lille gruppe i bjerge: Kun styrke tæller
            if (grpSize <= 2) {
                udbBonus += (grpStyrke - 80) * 0.001;
            }
    } else if (e.type === "kuperet") {
        // Kuperet: Nemmere at holde hjem, men check om der er favoritter
        var harFavorit = false;
        for (var fi = 0; fi < g.ryt.length; fi++) {
            if (g.ryt[fi].gc > 82) {
                harFavorit = true;
                break;
            }
        }
        
        if (harFavorit) {
            // Favoritter i udbrud: Feltet jagter hårdere, mindre bonus
            udbBonus = 0.02 + (grpStyrke - 70) * 0.001;
        } else {
            // Uden favoritter: Nemmere at holde hjem
            udbBonus = 0.04 + (grpStyrke - 70) * 0.0015;
            if (grpSize >= 2) {
                udbBonus += 0.02;
            }
        }
    } else {
        // Flad etape: Udbrud får bonus tidligt, feltet henter ind gradvist
        if (G.km < e.dist * 0.35) {
            // Første tredjedel: Udbrud får moderat bonus
            udbBonus = 0.04;
            if (grpSize >= 3) udbBonus += 0.01;
            if (grpSize >= 5) udbBonus += 0.01;
        } else if (G.km < e.dist * 0.6) {
            // Midten: Feltet begynder at jagte
            udbBonus = 0.03;
            if (grpSize >= 4) udbBonus += 0.01;
        } else {
            // Sidste 40%: Feltet jagter hårdt
            udbBonus = 0.02;
            if (grpSize >= 4) udbBonus += 0.005;
        }
    }

    spd += udbBonus;
    
    // Tilfældig variation - udbrud er dynamiske
    spd += (Math.random() - 0.5) * 0.012;
    
    }
     else if (g.type === "gruppetto") {
            // Gruppetto får også lidt gruppefordel
            spd += grpSizeBonus * 0.5;
            spd *= 0.82;
            // Gruppetto kan også variere lidt
            spd += (Math.random() - 0.5) * 0.006;
        }
        
        // Stejle stigninger påvirker alle grupper forskelligt
        if (stig > 15) {
            // På stejle stigninger: Styrke vigtigere, gruppestørrelse mindre vigtig
            var stejlFaktor = (grpStyrke - 60) * 0.001;
            spd += stejlFaktor;
            // Reducer gruppefordel på stejle stigninger
            spd -= grpSizeBonus * 0.3;
        }
        
        // Nedkørsler - gruppefordel stadig vigtig (læ, hastighed)
        if (stig < -10) {
            spd *= 1.04;
            // Store grupper kører hurtigere ned ad også
            spd += grpSizeBonus * 0.5;
        }
        
        g.pos += spd;
    }
    
    var sg = findInArr(G.grp, function(g) { return g.ryt.indexOf(G.spiller) >= 0; });
    
    // Km viser altid den forreste gruppes position
    G.grp.sort(function(a, b) { return b.pos - a.pos; });
    if (G.grp[0]) G.km = Math.floor(G.grp[0].pos);
    
    // Ryttere falder fra i bjerge - især på stejle stigninger
    if ((e.type === "bjerg" || e.type === "kuperet") && stig > 12) {
        var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });
        if (felt && felt.ryt.length > 8) {
            // Jo stejlere, jo flere falder fra
            var basisChance = e.type === "bjerg" ? 0.02 : 0.008;
            var stejlBonus = Math.min(stig / 30, 1.5); // Op til 1.5x ved stejle stigninger
            var faldChance = basisChance * (1 + stejlBonus);
        
            var faldne = [];
            for (var i = 0; i < felt.ryt.length; i++) {
                var r = felt.ryt[i];
                if (r.sp || r.ude) continue;
    
                // === GC/BJERG-BESKYTTELSE ===
                // Stærke GC-klatrere må IKKE falde fra alt for tidligt
                // Fx gc ≥ 82 og bj ≥ 80
                if (r.gc >= 82 && r.bj >= 80) {
                    // På bjergetaper: fuldt beskyttet i første halvdel
                    if (e.type === "bjerg" && G.km < e.dist * 0.5) continue;
                    // På kuperede etaper: fuldt beskyttet i første 35%
                    if (e.type === "kuperet" && G.km < e.dist * 0.35) continue;
                }
    
                // Risiko baseret på klatreevne, energi og stigningens stejlhed
                var klatreManko = (100 - r.bj) / 100;
                var energiManko = (100 - r.energi) / 100;
                var riskFaktor = klatreManko * 0.5 + energiManko * 0.5;
            
                // Ekstra risiko ved stejle stigninger for dårlige klatrere
                if (stig > 20 && r.bj < 70) {
                    riskFaktor *= 1.5;
                }
            
                if (Math.random() < faldChance * riskFaktor) {
                    faldne.push(r);
                }
            }

        
            if (faldne.length > 0) {
                var bagudGrp = findInArr(G.grp, function(g) { 
                    return g.type === "gruppetto" && g.pos < felt.pos && felt.pos - g.pos < 3; 
                });
            
                if (!bagudGrp && faldne.length >= 1) {
                    bagudGrp = { type: "gruppetto", navn: "Bagud", ryt: [], pos: felt.pos - 0.2, tf: 0 };
                    G.grp.push(bagudGrp);
                }
            
                if (bagudGrp) {
                    for (var i = 0; i < faldne.length; i++) {
                        felt.ryt = felt.ryt.filter(function(x) { return x !== faldne[i]; });
                        bagudGrp.ryt.push(faldne[i]);
                    }
                    if (faldne.length >= 2) {
                        G.msg = "🏔️ " + faldne.length + " kan ikke følge tempoet!";
                    } else {
                        G.msg = "🏔️ " + faldne[0].navn.split(" ").pop() + " sættes!";
                    }
                }
            }
        }
    }

    
// AI angreb - baseret på etapetype og energi
if (e.type === "bjerg" && Math.random() < 0.05) {
    aiAngrebBjerg();
} else if (e.type === "kuperet" && Math.random() < 0.05) {
    aiAngrebKuperet();
} else if (e.type === "flad" && Math.random() < 0.04) {
    aiAngrebEnergi();
} else if (e.type === "kuperet" && Math.random() < 0.03) {
    aiAngrebEnergi();
}

// Favoritter angriber fra favoritgruppe (fra halvvejs)
if ((e.type === "bjerg" || e.type === "kuperet") && G.km > e.dist * 0.5) {
    favoritAngrebMidtvejs();
}
    
// Favoritter angriber hinanden tæt på mål i bjerge
if (e.type === "bjerg" && G.km > e.dist - 15) {
    favoritAngrebSlut();
}

// Favoritter angriber på kuperet i sidste fjerdedel
if (e.type === "kuperet" && G.km > e.dist * 0.75) {
    favoritAngrebKuperet();
}

// Styrt-check
    if (Math.random() < 0.001 && !G.etapeSlut && G.km > 50 && G.km < e.dist - 2) {
        var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });
        if (felt && felt.ryt.length > 20) {
            // Tæl eksisterende styrt denne etape
            var styrtDenneEtape = 0;
            for (var hi = 0; hi < HOEJDEPUNKTER.length; hi++) {
                if (HOEJDEPUNKTER[hi].type === "styrt") styrtDenneEtape++;
            }
            if (styrtDenneEtape < 2) {
                // Find kandidater: ikke spilleren, ikke gc>75, ikke sprintere>80
                var styrtKand = [];
                for (var si = 0; si < felt.ryt.length; si++) {
                    var sr = felt.ryt[si];
                    if (sr.sp || sr.ude) continue;
                    if (sr.gc > 75) continue;
                    if (sr.spr > 80) continue;
                    styrtKand.push(sr);
                }
                if (styrtKand.length > 0) {
                    var styrtet = styrtKand[ri(0, styrtKand.length - 1)];
                    styrtet.ude = true;
                    styrtet.styrt = true;
                    felt.ryt = felt.ryt.filter(function(x) { return x !== styrtet; });
                    G.msg = "⚠️ STYRT! " + styrtet.navn.split(" ").pop() + " udgår!";
                    logHoejdepunkt("styrt", { rytter: styrtet.navn, km: G.km });
                }
            }
        }
    }
    
    // Mellempunkter
    if (G.mps && G.mps.length > 0) chkMP();

    
    // AI udbrud - oftere på flad og kuperet
var udbCount = 0;
for (var i = 0; i < G.grp.length; i++) { if (G.grp[i].type === "udbrud") udbCount++; }
var udbChance = info.uch * 1.5;
if (e.type === "flad") udbChance = info.uch * 3;
else if (e.type === "kuperet") udbChance = info.uch * 2.5;
if (Math.random() < udbChance && udbCount < 5) aiUdb();

    
    // Tilbyd udbrud - oftere i bjerge
    if (sg && sg.type === "felt" && G.spiller.energi > 20 && !G.vent) {
        var ch = 0.005;
        if (e.type === "bjerg") ch = 0.020;
        else if (e.type === "kuperet") ch = 0.012;
        if (Math.random() < ch) { tilbyd(); return; }
    }
    
    // Fusions-check (grupper der mødes)
    fusionGrupper();
    
    chkIndhent();
    
    // Sorter grupper
    G.grp.sort(function(a, b) { return b.pos - a.pos; });
    var fp = G.grp[0] ? G.grp[0].pos : 0;
    for (var i = 0; i < G.grp.length; i++) {
        G.grp[i].tf = (fp - G.grp[i].pos) * info.sek;
    }
    
    // Mål?
    if (G.grp[0] && G.grp[0].pos >= e.dist) { afslut(); return; }
    
    rend();
}

function aiAngrebKuperet() {
    var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });
    if (!felt || felt.ryt.length < 10) return;
    
    var e = G.etaper[G.enr];
    
    // Find ryttere med god energi - men IKKE de store GC-folk (undtagen sidste tredjedel)
    var kand = [];
    for (var i = 0; i < felt.ryt.length; i++) {
        var r = felt.ryt[i];
        if (r.sp || r.ude) continue;
        
        // GC-favoritter holder sig i ro på kuperede etaper - kun aktive i sidste tredjedel

                if (g1.ryt.indexOf(g2.ryt[j]) < 0) {
                    g1.ryt.push(g2.ryt[j]);
                }
            }
                
                // Bestem nyt navn og type
                if (g1.type === "felt" || g2.type === "felt") {
                    g1.type = "felt";
                    g1.navn = "Feltet";
                    G.msg = "🔄 Grupper samlet med feltet!";
                } else if (g1.type === "udbrud" && g2.type === "udbrud") {
                    g1.navn = "Udbrud (" + g1.ryt.length + ")";
                    G.msg = "🔄 Udbrud slået sammen!";
                } else if (g1.type === "gruppetto" || g2.type === "gruppetto") {
                    g1.type = "gruppetto";
                    g1.navn = "Gruppetto";
                }
                
                // Fjern den tomme gruppe
                G.grp.splice(i + 1, 1);
                fusioneret = true;
                break;
            }
        }
    }
    
    // Fjern tomme grupper
    G.grp = G.grp.filter(function(g) { return g.ryt.length > 0; });
}

function chkMP() {
    var e = G.etaper[G.enr];
    
    // Check alle mellempunkter der ikke er done
    for (var mi = 0; mi < G.mps.length; mi++) {
        var mp = G.mps[mi];
        if (mp.done) continue;
        
        // Check om førende gruppe har krydset
        G.grp.sort(function(a, b) { return b.pos - a.pos; });
        if (G.grp.length === 0 || G.grp[0].pos < mp.km) continue;
        
        mp.done = true;
        
        // Saml ALLE ryttere fra ALLE grupper, sorteret efter position
        var alleRyttere = [];
        for (var gi = 0; gi < G.grp.length; gi++) {
            var g = G.grp[gi];
            var so = g.ryt.slice();
            
            // Sortér internt i gruppen efter relevant evne
            if (mp.type === "sprint") {
                so.sort(function(a, b) { return (b.spr + ri(-8,8)) - (a.spr + ri(-8,8)); });
            } else {
                so.sort(function(a, b) { return (b.bj + ri(-8,8)) - (a.bj + ri(-8,8)); });
            }
            
            for (var ri2 = 0; ri2 < so.length; ri2++) {
                alleRyttere.push({ r: so[ri2], grpPos: g.pos });
            }
        }
        
        // Sortér efter gruppeposition (højeste først)
        alleRyttere.sort(function(a, b) { return b.grpPos - a.grpPos; });
        
        // Giv point
        var pointModtagere = Math.min(mp.pts.length, alleRyttere.length);
        
        for (var i = 0; i < pointModtagere; i++) {
            var pts = mp.pts[i];
            if (mp.type === "sprint") {
                G.sprPts[alleRyttere[i].r.navn] = (G.sprPts[alleRyttere[i].r.navn] || 0) + pts;
            } else {
                G.bjgPts[alleRyttere[i].r.navn] = (G.bjgPts[alleRyttere[i].r.navn] || 0) + pts;
            }
        }
        
        // Gem resultat til visning
        G.lastMpResult = { type: mp.type, top10: [] };
        for (var i = 0; i < pointModtagere; i++) {
            G.lastMpResult.top10.push({ 
                navn: alleRyttere[i].r.navn, 
                sp: alleRyttere[i].r.sp, 
                pts: mp.pts[i] 
            });
        }
	logHoejdepunkt(mp.type, { vinder: alleRyttere[0].r.navn, km: mp.km });
        
        // Besked
        var spi = -1;
        for (var i = 0; i < pointModtagere; i++) {
            if (alleRyttere[i].r.sp) { spi = i; break; }
        }
        var gt = getGT();
		var em = mp.type === "sprint" ? gt.spEmoji + " SPRINT" : gt.bjEmoji + " BJERG";
        
        if (spi >= 0) {
            G.msg = em + ": Du blev nr. " + (spi + 1) + "! (+" + mp.pts[spi] + " pts)";
        } else {
            G.msg = em + ": " + alleRyttere[0].r.navn.split(" ").pop() + " vinder!";
        }
        
        // Fjern mellempunkt-resultat efter 6 sekunder
        setTimeout(function() {
            G.lastMpResult = null;
        }, 6000);
        
        // Kun ét mellempunkt ad gangen
        return;
    }
}

function aiUdb() {
    var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });
    if (!felt || felt.ryt.length < 15) return;
    
    var e = G.etaper[G.enr];
    var info = ETYPER[e.type];
    var n = e.type === "bjerg" ? ri(1,3) : e.type === "kuperet" ? ri(2,5) : ri(info.min, 8);
    
// Check om vi er på en stigning
var ki = Math.min(Math.floor(G.km), G.profil.length - 2);
var stig = G.profil[ki + 1] - G.profil[ki];

var kand = [];
for (var i = 0; i < felt.ryt.length; i++) {
    var r = felt.ryt[i];
    if (r.sp || r.ude) continue;
    
    // Basis: energi over 35%
    if (r.energi < 35) continue;
    
// På bjergetaper: Favoritter (gc > 75) venter til første stigning
if (e.type === "bjerg" && r.gc > 75 && stig < 10) continue;

// På kuperede etaper: GC-favoritter venter til sidste tredjedel
if (e.type === "kuperet" && r.gc > 70 && G.km < e.dist * 0.67) continue;

        
        // Beregn angrebslyst baseret på energi
var energiBonus = (r.energi - 35) / 65; // 0-1
var basisChance = 0.3;

// Højere chance med mere energi
if (r.energi > 60) basisChance += 0.2;
if (r.energi > 80) basisChance += 0.2;

// Modificer med relevante evner - højere chance på flad og kuperet for ikke-GC ryttere
if (e.type === "bjerg") {
    basisChance *= (r.bj / 80);
} else if (e.type === "flad") {
    basisChance *= (r.spr / 70); // Lettere for sprintere
    if (r.gc < 75) basisChance *= 1.5; // Ikke-GC ryttere er mere aggressive
    if (r.ud > 80) basisChance *= 1.3; // Udholdende ryttere
} else if (e.type === "kuperet") {
    basisChance *= ((r.bj + r.spr) / 140);
    if (r.gc < 75) basisChance *= 1.4; // Ikke-GC ryttere er mere aggressive
    if (r.bj > 75) basisChance *= 1.2; // Gode klatrere
}
        
        if (Math.random() < basisChance * energiBonus) {
            kand.push(r);
        }
    }
    
    if (e.type === "bjerg") kand.sort(function(a,b) { return (b.bj + b.energi*0.3) - (a.bj + a.energi*0.3); });
    else if (e.type === "flad") kand.sort(function(a,b) { return (b.spr + b.energi*0.3) - (a.spr + a.energi*0.3); });
    else kand.sort(function(a,b) { return b.energi - a.energi; });
    
    if (kand.length < n) {
        // Fyld op med tilfældige energiske ryttere
        var ekstra = [];
        for (var i = 0; i < felt.ryt.length; i++) {
            var r = felt.ryt[i];
            if (!r.sp && !r.ude && r.energi > 50 && kand.indexOf(r) < 0) {
                ekstra.push(r);
            }
        }
        ekstra.sort(function(a,b) { return b.energi - a.energi; });
        while (kand.length < n && ekstra.length > 0) {
            kand.push(ekstra.shift());
        }
    }
    
    if (kand.length === 0) return;
    
    var udb = kand.slice(0, n);
    for (var i = 0; i < udb.length; i++) {
        felt.ryt = felt.ryt.filter(function(x) { return x !== udb[i]; });
        udb[i].gi = G.grp.length;
    }
    
    var udbNum = 1;
for (var i = 0; i < G.grp.length; i++) { if (G.grp[i].type === "udbrud") udbNum++; }

// Check om der er store favoritter med (gc > 85)
var harStorFavorit = false;
for (var i = 0; i < udb.length; i++) {
    if (udb[i].gc > 85) {
        harStorFavorit = true;
        break;
    }
}

var udbNavn = harStorFavorit ? "Favoritgruppe" : "Udbrud";
G.grp.push({ type: "udbrud", navn: udbNavn, ryt: udb, pos: felt.pos + 0.3, tf: 0 });

    G.msg = "🚴💨 " + udb.length + " ryttere angriber!";
    if (udb.length >= 1) {
                 logHoejdepunkt("udbrud", { antal: udb.length, km: G.km });
          }
}

function tilbyd() {
    var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });
    if (!felt) return;
    
    var e = G.etaper[G.enr];
    var n = e.type === "bjerg" ? ri(0,2) : e.type === "kuperet" ? ri(1,3) : ri(2,5);
    
    var kand = [];
    for (var i = 0; i < felt.ryt.length; i++) {
        if (!felt.ryt[i].sp && felt.ryt[i].energi > 35) kand.push(felt.ryt[i]);
    }
    var med = sh(kand).slice(0, n);
    var cost = e.type === "bjerg" ? 5 : e.type === "kuperet" ? 4 : 3;
    
    G.vent = true;
    G.udata = { med: med, cost: cost };
    
    // Automatisk nej efter 5 sekunder
    G.udbrudTimeout = setTimeout(function() {
        if (G.vent && G.udata) {
            G.msg = "⏱️ For langsom - du bliver i feltet.";
            rejUdb();
        }
    }, 5000);
    
    rend();
}

function accUdb() {
    if (!G.udata) return;
    
    // Stop timeout
    if (G.udbrudTimeout) {
        clearTimeout(G.udbrudTimeout);
        G.udbrudTimeout = null;
    }
    
    var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });

    if (!felt) return;
    
    var d = G.udata;
    if (G.spiller.energi < d.cost) { G.msg = "❌ Ikke nok energi!"; G.vent = false; G.udata = null; return; }
    
    G.spiller.energi -= d.cost;
    felt.ryt = felt.ryt.filter(function(r) { return r !== G.spiller; });
    for (var i = 0; i < d.med.length; i++) {
        felt.ryt = felt.ryt.filter(function(x) { return x !== d.med[i]; });
    }
    
    // GC-ryttere reagerer på spillerens angreb
    var e = G.etaper[G.enr];
    var reagerende = [];
    for (var i = 0; i < felt.ryt.length; i++) {
        var r = felt.ryt[i];
        if (r.gc > 78 && !r.ude && r.energi > 35) {
            // Højere chance for at reagere jo bedre GC-rytter
            var reaktionsChance = (r.gc - 75) / 25 * (r.energi / 100);
            // Øget chance på bjerge og kuperet
            if (e.type === "bjerg") reaktionsChance *= 1.3;
            else if (e.type === "kuperet") reaktionsChance *= 1.1;
            
            if (Math.random() < reaktionsChance * 0.7) {
                reagerende.push(r);
            }
        }
    }
    
    // Fjern reagerende fra feltet
    for (var i = 0; i < reagerende.length; i++) {
        felt.ryt = felt.ryt.filter(function(x) { return x !== reagerende[i]; });
        reagerende[i].energi -= 4;
    }
    
    var ni = G.grp.length;
    G.spiller.gi = ni;
    for (var i = 0; i < d.med.length; i++) d.med[i].gi = ni;
    for (var i = 0; i < reagerende.length; i++) reagerende[i].gi = ni;
    
    var ryt = [G.spiller];
    for (var i = 0; i < d.med.length; i++) ryt.push(d.med[i]);
    for (var i = 0; i < reagerende.length; i++) ryt.push(reagerende[i]);
    
    var navn = ryt.length > 1 ? "Udbrud" : "Solo";
    G.grp.push({ type: "udbrud", navn: navn, ryt: ryt, pos: felt.pos + 0.4, tf: 0 });
    
    if (reagerende.length > 0) {
        G.msg = "🚀 Du angriber! " + reagerende.length + " GC-ryttere reagerer!";
    } else if (d.med.length > 0) {
        G.msg = "🚀 Du angriber med " + d.med.length + " andre!";
    } else {
        G.msg = "🚀 SOLO ANGREB!";
    }
    logHoejdepunkt("angreb", { rytter: G.spiller.navn, km: G.km, type: "spiller" });

    G.vent = false; G.udata = null;
}

function rejUdb() {

    var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });

function chkIndhent() {
    var felt = findInArr(G.grp, function(g) { return g.type === "felt"; });
    if (!felt) return;
    
    var e = G.etaper[G.enr];
    var info = ETYPER[e.type];
    
// Feltet jagter - MEGET mindre effektivt i bjerge
var jagteRate = (2 - info.felt) * 0.0001 * info.grpBonus;
if (e.type === "bjerg") jagteRate *= 0.45;
else if (e.type === "kuperet") jagteRate *= 0.1;
else if (e.type === "flad") jagteRate *= 0.1;
    
    var newGrp = [];
for (var i = 0; i < G.grp.length; i++) {
    var g = G.grp[i];
    if (g.type === "udbrud") {
        var afstand = g.pos - felt.pos;
        
        // Check om der er klassementryttere i udbruddet
        var harKlassement = false;
        for (var ui = 0; ui < g.ryt.length; ui++) {
            if (g.ryt[ui].gc > 82) {
                harKlassement = true;
                break;
            }
        }
        
        // Beregn gennemsnitlig energi i udbruddet
        var udbrudEnergi = 0;
        for (var ui = 0; ui < g.ryt.length; ui++) {
            udbrudEnergi += g.ryt[ui].energi;
        }
        udbrudEnergi = g.ryt.length > 0 ? udbrudEnergi / g.ryt.length : 50;
        
        // Modificer jagterate baseret på klassement og energi
    var modJagteRate = jagteRate;
    if (!harKlassement) {
        // Uden klassementryttere jagter feltet mindre aggressivt
        if (e.type === "bjerg") modJagteRate *= 0.5;
        else if (e.type === "kuperet") modJagteRate *= 0.55;
        else modJagteRate *= 0.70;
        
        // Hvis udbruddet har meget energi, er de endnu sværere at hente
        if (udbrudEnergi > 70) modJagteRate *= 0.7;
        else if (udbrudEnergi > 50) modJagteRate *= 0.85;
    
        // På flade etaper: Feltet venter længere i første halvdel
        if (e.type === "flad" && G.km < e.dist * 0.5) {
            modJagteRate *= 0.3;
        }
    } else {
        // MED klassementryttere jagter feltet MEGET hårdere
        if (e.type === "kuperet") modJagteRate *= 1.8;
        else if (e.type === "flad") modJagteRate *= 1.5;
    }
    
           
    // Felt kører kun op hvis ret tæt på - venter længere på flade/kuperede
    // Udbrud kan få op til 1 min forspring (ca. 0.8-1.2 km ved normal hastighed)
    var jagtAfstand = 5;
    if (e.type === "flad") jagtAfstand = 3;
    else if (e.type === "kuperet") jagtAfstand = 4;
    
    // Beregn tidsforskel i sekunder (afstand * sek per km)
    var tidsForskel = afstand * info.sek;
    
    // Først start jagten når udbruddet har fået nok forspring
    // Nemmere at holde hjem på kuperet end flad
    var minTidsForskel = 0;
    if (e.type === "kuperet") minTidsForskel = 150; // 2.5 minutter - nemmest at holde hjem
    else if (e.type === "flad") minTidsForskel = 120; // 2 minutter
    else if (e.type === "bjerg") minTidsForskel = 30; // 30 sekunder
    
    if (tidsForskel > minTidsForskel && afstand < jagtAfstand) {
        felt.pos += modJagteRate;
    }

    // Feltet sætter farten op hvis de er mere end 5 minutter bagud
    if (tidsForskel > 300) {
        // Check om der er GC-ryttere i feltet
        var harGCiFelt = false;
        for (var fi = 0; fi < felt.ryt.length; fi++) {
            if (felt.ryt[fi].gc > 78) {
                harGCiFelt = true;
                break;
            }
        }
    
        if (harGCiFelt) {
            // Feltet jagter MEGET hårdere - ekstra fart
            var panikRate = 0.08;
            if (tidsForskel > 400) panikRate = 0.15; // Over 6.5 min
            if (tidsForskel > 480) panikRate = 0.25; // Over 8 min
            if (tidsForskel > 600) panikRate = 0.40; // Over 10 min
            felt.pos += panikRate;
            
            // Sæt besked hvis de virkelig jagter
            if (tidsForskel > 400 && Math.random() < 0.02) {
                G.msg = "🔥 Feltet sætter fuld fart på!";
            }
        }
    }

         
            // Indhent kun hvis MEGET tæt
            var indhentAfstand = e.type === "flad" ? 0.06 : 0.08;
            if (afstand < indhentAfstand) {
                for (var j = 0; j < g.ryt.length; j++) {
                    if (felt.ryt.indexOf(g.ryt[j]) < 0) {
                        felt.ryt.push(g.ryt[j]);
                        g.ryt[j].gi = 0;
                    }
                }
                G.msg = "🏳️ Udbrud indhentet!";
		logHoejdepunkt("indhent", { km: G.km });
                continue;
            }
        }
        newGrp.push(g);
    }
    G.grp = newGrp;
    
    // Slå små gruppettoer sammen
    var gruppettoer = [];
    for (var i = 0; i < G.grp.length; i++) {
        if (G.grp[i].type === "gruppetto") gruppettoer.push(G.grp[i]);
    }
    if (gruppettoer.length > 1) {
        gruppettoer.sort(function(a, b) { return b.pos - a.pos; });
        for (var i = 1; i < gruppettoer.length; i++) {
            if (gruppettoer[0].pos - gruppettoer[i].pos < 1) {
                for (var j = 0; j < gruppettoer[i].ryt.length; j++) {
                    gruppettoer[0].ryt.push(gruppettoer[i].ryt[j]);
                }
                gruppettoer[i].ryt = [];
            }
        }
        // Fjern tomme grupper
        G.grp = G.grp.filter(function(g) { return g.ryt.length > 0; });
    }
}

function flytTilGruppetto(r) {
    // Find nuværende gruppe
    var rg = findInArr(G.grp, function(g) { return g.ryt.indexOf(r) >= 0; });
    if (!rg) return;

    // Fjern rytteren fra sin nuværende gruppe
    rg.ryt = rg.ryt.filter(function(x) { return x !== r; });

    // Marker rytteren som helt færdig
    r.heltFærdig = true;
    
    // Opret en lille bagud-gruppe lige bag den gruppe, han kom fra
    var bagud = {
        type: "gruppetto",
        navn: "Udkørt",
        ryt: [r],
        pos: rg.pos - 0.3,  // kun 0.3 km bagved den gruppe, han sad i
        tf: 0
    };
    G.grp.push(bagud);
    r.gi = G.grp.length - 1;
}


function rensGrupper() {
    // Fjern udgåede ryttere fra alle grupper
    for (var i = 0; i < G.grp.length; i++) {
        G.grp[i].ryt = G.grp[i].ryt.filter(function(r) { return !r.ude; });
    }
    // Fjern tomme grupper
    G.grp = G.grp.filter(function(g) { return g.ryt.length > 0; });
}

function accel() {
    if (G.vent || G.etapeSlut) return;   // ← tilføj G.etapeSlut    
    var e = G.etaper[G.enr];
    var info = ETYPER[e.type];
    var cost = Math.round(2 + info.enrg * 35);
    
    // Billigere at accelerere i bjerge hvis man er god klatrer
    if (e.type === "bjerg") {
        cost = Math.round(cost * (1.2 - G.spiller.bj / 200));
    }
    
    if (G.spiller.energi < cost) { G.msg = "❌ Ikke nok energi!"; rend(); return; }
    G.spiller.energi -= cost;
    
    var sg = findInArr(G.grp, function(g) { return g.ryt.indexOf(G.spiller) >= 0; });
    if (!sg) return;
    
    if (sg.type === "felt") {
        var udb = findInArr(G.grp, function(g) { 
            return g.type === "udbrud" && g.pos > sg.pos && g.pos - sg.pos < 5; 
        });
        
if (udb) {
    // Find kun den NÆRMESTE gruppe foran
    var nærmeste = null;
    var mindsteAfstand = 999;
    for (var gi = 0; gi < G.grp.length; gi++) {
        var grp = G.grp[gi];
        if (grp.pos > sg.pos && grp.pos - sg.pos < mindsteAfstand) {
            mindsteAfstand = grp.pos - sg.pos;
            nærmeste = grp;
        }
    }
    
    if (!nærmeste || mindsteAfstand > 2) {
        G.msg = "❌ Ingen gruppe tæt nok på!";
        rend();
        return;
    }
    
    // Sværere at komme op jo længere væk gruppen er
    var afstandsFaktor = 1 - (mindsteAfstand / 2) * 0.3;
    var ch = 0.35 * afstandsFaktor;
    if (e.type === "bjerg") ch = (0.45 + G.spiller.bj / 200) * afstandsFaktor;
    else if (e.type === "kuperet") ch = (0.40 + G.spiller.bj / 300) * afstandsFaktor;
    else ch = (0.35 + G.spiller.fl / 300) * afstandsFaktor;
    
    if (Math.random() < ch) {
        sg.ryt = sg.ryt.filter(function(r) { return r !== G.spiller; });
        
        // GC-ryttere i feltet reagerer når spilleren kører op til udbrud
        var reagerende = [];

function pause() {

function startTT() {
    var e = G.etaper[G.enr];
    G.etapeSlut = false;    // ← nulstil
    G.enkRes = [];
    for (var i = 0; i < G.ryttere.length; i++) {
        var r = G.ryttere[i];
        if (r.sp || r.ude) continue; // Spring spilleren og udgåede ryttere over
        var base = e.dist * 70;
        var ttf = (100 - r.tt) / 100;
        var ef = (100 - r.energi) / 150;
        var tid = base * (1 + ttf * 0.28 + ef * 0.06) * rf(0.985, 1.02);
        
        // AI kan accelerere så længe de har energi
        while (r.energi > 30) {
            // Sandsynlighed for at accelerere baseret på TT-evne og energi
            var accChance = (r.tt / 100) * (r.energi / 100) * 0.5; 
            if (Math.random() < accChance) {
                r.energi -= 3;
                tid -= 8;
            }
        }
        
        G.enkRes.push({ r: r, tid: Math.round(tid) });
    }
    G.enkRes.sort(function(a, b) { return a.tid - b.tid; });
    G.sTid = 0;
    G.km = 0;
    if (G.iv) clearInterval(G.iv);
    G.iv = setInterval(loopTT, 500);
    rendTT();
}


function loopTT() {
    if (G.etapeSlut) return;   // ← sikkerhed for enkeltstart

    G.tid += info.sek;
    G.sTid += info.sek;
    
    var ttb = G.spiller.tt / 100;
    var eb = G.spiller.energi / 100;
    // Meget hurtigere fremgang - ca 1 km per opdatering
    var spd = 44 + 10 * ttb;
    G.km = Math.min(G.km + (spd * info.sek / 3600), e.dist);
    
    var uf = (100 - G.spiller.ud) / 100;
    G.spiller.energi = Math.max(0, G.spiller.energi - info.enrg * 0.7 * (1 + uf * 0.3));
    
    if (G.km >= e.dist - 0.01) { G.km = e.dist; afslutTT(); return; }
    rendTT();
}

function tegnTTP() {
    var c = $("cv");
    if (!c) return;
    c.width = c.parentElement.clientWidth - 4;
    c.height = 180;
    var ctx = c.getContext("2d");
    var e = G.etaper[G.enr];
    var p = G.profil;
    
    ctx.fillStyle = "#011";
    ctx.fillRect(0, 0, c.width, c.height);
    
    var maxH = Math.max.apply(null, p), minH = Math.min.apply(null, p);
    minH = 0;
    maxH = maxH + 100;
    var rng = maxH - minH;
    if (rng < 800) { maxH = minH + 800; rng = 800; }

    var l = 8, bm = 20, r = 12, t = 16;
    var w = c.width - l - r, h = c.height - bm - t;
    
    // Profil - fyldt område
    ctx.beginPath();
    for (var i = 0; i < p.length; i++) {
        var x = l + (i / (p.length - 1)) * w;
        var y = t + h - ((p[i] - minH) / rng) * h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = "#088";
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.lineTo(l + w, t + h);
    ctx.lineTo(l, t + h);
    ctx.fillStyle = "rgba(0,100,100,0.25)";
    ctx.fill();
    
    // Rytter-position
    var km = Math.min(G.km, e.dist);
    var px = l + (km / e.dist) * w;
    var idx = Math.min(Math.floor(km), p.length - 1);
    var py = t + h - ((p[idx] - minH) / rng) * h;
    
    // Cirkel bag rytter
    ctx.beginPath();
    ctx.arc(px, py - 14, 12, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0, 255, 255, 0.2)";
    ctx.fill();
    ctx.strokeStyle = "#0ff";
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Rytter-antal (bare "1" for TT)
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = "center";
    ctx.fillText("1", px, py - 10);
    
    // Mål
    ctx.strokeStyle = "#fff";
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(l + w, t);
    ctx.lineTo(l + w, t + h);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#fff";
    ctx.font = "16px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("🏁", l + w, t + 14);
    
    // X-labels
    ctx.fillStyle = "#888";
    ctx.font = "11px monospace";
    ctx.textAlign = "left";
    ctx.fillText("0km", l, t + h + 14);
    ctx.textAlign = "right";
    ctx.fillText(e.dist + "km", l + w, t + h + 14);
    
    // Y-labels
    ctx.font = "10px monospace";
    ctx.fillStyle = "#888";
    ctx.textAlign = "left";
    ctx.fillText(Math.round(maxH) + "m", 8, t);
    ctx.fillText(Math.round(minH) + "m", 8, t + h - 2);
}
