<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrandTours - Giro · Tour · Vuelta</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffff00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GrandTours">

    <style>
    /* ========== CSS CUSTOM PROPERTIES FOR GT THEMING ========== */
    :root {
        /* Default: Tour de France */
        --gt-primary: #ff0;
        --gt-secondary: #aa0;
        --gt-bg: #110;
        --gt-bg-box: #110;
        --gt-gc-color: #ff0;
        --gt-gc-bg: linear-gradient(135deg, #ff0 0%, #cc0 100%);
        --gt-gc-text: #000;
        --gt-gc-emoji: "🟡";
        --gt-sp-color: #0f0;
        --gt-sp-bg: linear-gradient(135deg, #0f0 0%, #0a0 100%);
        --gt-sp-text: #000;
        --gt-sp-emoji: "🟢";
        --gt-bj-color: #f44;
        --gt-bj-bg: linear-gradient(135deg, #fff 0%, #ddd 100%);
        --gt-bj-text: #f00;
        --gt-bj-emoji: "🔴";
        --gt-felt-color: #0cc;
        --gt-felt-bg: #023;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        background: #000; 
        color: var(--gt-primary); 
        font-family: 'Courier New', monospace; 
        padding: 16px; 
        font-size: 16px; 
        padding-top: max(16px, env(safe-area-inset-top));
        padding-bottom: max(16px, env(safe-area-inset-bottom));
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
    }
    
    #game { 
        max-width: 1150px; 
        margin: 0 auto; 
        border: 3px solid var(--gt-primary); 
        padding: 18px; 
        background: var(--gt-bg); 
        border-radius: 6px; 
    }

    h1 { 
        color: var(--gt-primary); 
        text-align: center; 
        margin-bottom: 14px; 
        font-size: 34px; 
    }
    h2 { 
        color: var(--gt-primary); 
        border-bottom: 2px solid var(--gt-secondary); 
        padding-bottom: 6px; 
        margin-bottom: 12px; 
        font-size: 24px; 
    }
    h3 { 
        color: #0ff; 
        margin-bottom: 8px; 
        font-size: 18px; 
    }
    .box { 
        border: 2px solid var(--gt-secondary); 
        padding: 14px; 
        margin: 12px 0; 
        background: var(--gt-bg-box); 
        border-radius: 5px; 
    }
        
    .hl { color: var(--gt-primary); }
    .ok { color: #0f0; }
    .pos { color: var(--gt-primary); }
    .warn { color: #f80; }
    .bad { color: #f44; }
    .cyan { color: #0ff; }
    
    .btn { 
        background: #111; 
        color: #0f0; 
        border: 2px solid #0f0; 
        padding: 10px 22px; 
        margin: 4px; 
        cursor: pointer; 
        font-family: inherit; 
        font-size: 17px; 
        border-radius: 5px; 
    }
    .btn:hover { background: #0f0; color: #000; }
    .btn[style*="border-color:#0f0"]:hover { background: #0f0; color: #000; }
    .btn[style*="border-color:#3399ff"]:hover { background: #003366; color: #3399ff; }
    .btn[style*="border-color:#3399ff"] { color: #3399ff; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-big { padding: 14px 32px; font-size: 20px; }
    .btn-y { border-color: var(--gt-primary); color: var(--gt-primary); }
    .btn-y:hover { background: var(--gt-primary); color: #000; }
    .btn-r { border-color: #f44; color: #f44; }
    .btn-r:hover { background: #f44; color: #fff; }
    
    input { 
        background: #111; 
        border: 2px solid var(--gt-primary); 
        color: var(--gt-primary); 
        padding: 12px; 
        font-size: 20px; 
        font-family: inherit; 
        border-radius: 5px; 
        width: 100%; 
        max-width: 360px; 
    }
    input:focus { outline: none; border-color: var(--gt-primary); }
    
    canvas { 
        width: 100%; 
        height: 230px; 
        border: 2px solid var(--gt-secondary); 
        background: linear-gradient(180deg, #111 0%, var(--gt-bg) 100%); 
        display: block; 
        margin: 10px 0; 
        border-radius: 5px; 
    }

    .ebar { 
        background: #222; border: 2px solid var(--gt-secondary); border-radius: 10px; 
        width: 190px; height: 18px; display: inline-block; vertical-align: middle; overflow: hidden; 
    }
    .efill { height: 100%; background: linear-gradient(90deg, #0f0, #0a0); border-radius: 10px; transition: width 0.3s; }
    .efill.low { background: linear-gradient(90deg, #f44, #a00); }
    .efill.med { background: linear-gradient(90deg, #f80, #a50); }
    
    .grp { 
        border: 2px solid #444; padding: 10px; margin: 5px; border-radius: 5px; 
        font-size: 14px; display: inline-block; vertical-align: top; min-width: 260px; 
    }
    
    .row { 
        padding: 4px 8px; font-size: 14px; border-bottom: 1px solid #330; 
        display: flex; justify-content: space-between; align-items: center;  
    }
    .row.pl { background: #333; color: #fff; }
    
    .ctrls { text-align: center; margin: 12px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
    
    .modal { 
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
        background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 99; 
    }
    .mbox { 
        border: 3px solid var(--gt-primary); padding: 30px; 
        background: linear-gradient(135deg, #111 0%, #000 100%); 
        border-radius: 12px; text-align: center; max-width: 520px; 
        box-shadow: 0 0 40px rgba(255,255,0,0.1); 
    }
    
    .jerseys { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
    .jersey { 
        padding: 8px 15px; border-radius: 8px; font-size: 14px; 
        text-align: center; min-width: 100px; font-weight: bold; 
    }
    .jgc { background: var(--gt-gc-bg); color: var(--gt-gc-text); box-shadow: 0 0 10px rgba(255,255,0,0.25); }
    .jsp { background: var(--gt-sp-bg); color: var(--gt-sp-text); box-shadow: 0 0 10px rgba(0,255,0,0.25); }
    .jbj { background: var(--gt-bj-bg); color: var(--gt-bj-text); box-shadow: 0 0 10px rgba(255,255,255,0.25); }
    /* Legacy aliases */
    .jy { background: var(--gt-gc-bg); color: var(--gt-gc-text); box-shadow: 0 0 10px rgba(255,255,0,0.25); }
    .jg { background: var(--gt-sp-bg); color: var(--gt-sp-text); box-shadow: 0 0 10px rgba(0,255,0,0.25); }
    .jp { background: var(--gt-bj-bg); color: var(--gt-bj-text); box-shadow: 0 0 10px rgba(255,255,255,0.25); }

    .sbar { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 14px; }
    .sbar .lbl { width: 100px; }
    .sbar .bg { flex: 1; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
    .sbar .fill { height: 100%; border-radius: 6px; }
    
    .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab { padding: 8px 15px; border: 2px solid var(--gt-secondary); cursor: pointer; border-radius: 4px; font-size: 14px; color: var(--gt-primary); }
    .tab.active { background: var(--gt-secondary); color: #000; }
    .tab:hover { background: #330; color: var(--gt-primary); }
    .tab.active:hover { background: var(--gt-secondary); color: #000; }

    .tab-gc { border-color: var(--gt-gc-color); }
    .tab-gc.active { background: var(--gt-gc-color); color: #000; }
    .tab-sp { border-color: var(--gt-sp-color); }
    .tab-sp.active { background: var(--gt-sp-color); color: #000; }
    .tab-bj { border-color: var(--gt-bj-color); }
    .tab-bj.active { background: var(--gt-bj-color); color: #000; }

    .mp-result { 
        background: linear-gradient(135deg, #220 0%, #110 100%); 
        border: 2px solid #f80; padding: 12px; border-radius: 8px; margin: 10px 0; 
    }
    .mp-result h4 { color: #f80; margin-bottom: 10px; font-size: 16px; }
    
    .time-display { 
        font-family: 'Courier New', monospace; background: #000; 
        border: 2px solid #3399ff; padding: 10px 18px; border-radius: 5px; 
        display: inline-block; font-size: 18px; color: var(--gt-primary);
    }

    /* GT-valg kort */
    .gt-card {
        border: 3px solid #444;
        padding: 16px;
        border-radius: 10px;
        cursor: pointer;
        text-align: center;
        min-width: 140px;
        transition: all 0.2s;
        background: #111;
        flex: 1;
    }
    .gt-card:hover { transform: scale(1.03); }
    .gt-card.selected { border-width: 4px; }
    .gt-card.gt-tdf { border-color: #ff0; }
    .gt-card.gt-tdf.selected { background: #330; box-shadow: 0 0 15px #ff04; }
    .gt-card.gt-giro { border-color: #ff69b4; }
    .gt-card.gt-giro.selected { background: #200015; box-shadow: 0 0 15px #ff69b44; }
    .gt-card.gt-vuelta { border-color: #f44; }
    .gt-card.gt-vuelta.selected { background: #200; box-shadow: 0 0 15px #f444; }
    .gt-card .gt-name { font-size: 16px; font-weight: bold; margin-top: 5px; }
    .gt-card .gt-emoji { font-size: 30px; }
    .gt-card .gt-date { font-size: 10px; color: #888; margin-top: 4px; }
    .gt-card .gt-strength { font-size: 10px; margin-top: 4px; }
    .gt-card.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

    /* Sæsonoversigt */
    .season-header {
        text-align: center;
        padding: 15px;
        border: 2px solid var(--gt-primary);
        border-radius: 8px;
        margin-bottom: 15px;
        background: linear-gradient(135deg, #111 0%, #000 100%);
    }

    /* PWA + Install styles (unchanged) */
    .install-banner { background: linear-gradient(135deg, #220 0%, #110 100%); border: 2px solid #0f0; border-radius: 8px; padding: 12px 16px; margin: 10px 0; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .install-banner-text { color: #0f0; font-size: 13px; flex: 1; min-width: 150px; }
    .install-banner-text small { color: #888; display: block; margin-top: 3px; font-size: 11px; }
    .install-btn { background: #0f0; color: #000; border: none; padding: 8px 16px; border-radius: 5px; font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
    .install-btn:hover { background: #0c0; }
    .install-dismiss { background: none; border: 1px solid #666; color: #666; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; }
    .ios-install-guide { background: linear-gradient(135deg, #112 0%, #001 100%); border: 2px solid #3399ff; border-radius: 8px; padding: 14px; margin: 10px 0; text-align: center; }
    .ios-install-guide p { color: #ccc; font-size: 13px; margin: 6px 0; line-height: 1.4; }
    .ios-install-guide .step { color: #3399ff; font-weight: bold; }
    @media (display-mode: standalone) { .install-banner, .ios-install-guide { display: none !important; } }

    .svaerhed-valg { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
    .svaerhed-boks { padding: 12px 20px; border: 3px solid #666; border-radius: 8px; cursor: pointer; text-align: center; min-width: 120px; transition: all 0.2s; background: #111; }
    .svaerhed-boks:hover { transform: scale(1.05); }
    .svaerhed-boks.let { border-color: #0f0; color: #0f0; }
    .svaerhed-boks.let.valgt { background: #0b3; box-shadow: 0 0 2px #0f0; color: #000; }
    .svaerhed-boks.normal { border-color: #ff0; color: #ff0; }
    .svaerhed-boks.normal.valgt { background: #ff0; box-shadow: 0 0 2px #ff0; color: #000; }
    .svaerhed-boks.svaer { border-color: #f44; color: #f44; }
    .svaerhed-boks.svaer.valgt { background: #f44; box-shadow: 0 0 2px #f44; color: #000; }
    .svaerhed-boks .navn { font-size: 16px; font-weight: bold; }

    .top-bar-mobile { display: none !important; }
    .mobil-txt { display: none; }

    @media (max-width: 768px) {
		.gt-card .gt-emoji { font-size: 18px; }
    	.gt-card .gt-name { font-size: 11px; }
    	.gt-card { padding: 8px; min-width: 80px; }
        .season-header h1 { font-size: 22px; }
        .top-bar-desktop { display: none !important; }
        .top-bar-mobile { display: block !important; }
        .jerseys { display: none; }
        .jerseys-box { display: none !important; }
        .desktop-txt { display: none; }
        .mobil-txt { display: inline; }
        body { padding: 8px; padding-top: max(8px, env(safe-area-inset-top)); padding-bottom: max(8px, env(safe-area-inset-bottom)); font-size: 14px; }
        #game { border-width: 2px; padding: 10px; }
        h1 { font-size: 26px; } h2 { font-size: 20px; } h3 { font-size: 16px; }
        .btn { font-size: 14px; padding: 8px 14px; }
        .btn-big { font-size: 16px; padding: 10px 20px; }
        canvas { height: 180px; }
        .row { line-height: 1.4; }
        .row span:first-child { display: flex; align-items: center; gap: 2px; }
        .ctrls .btn-big { flex: 1 1 auto; }
        .ctrls-3 .btn-big { flex: 1 1 30%; min-width: 90px; }
        .svaerhed-valg { gap: 5px; }
        .svaerhed-boks { padding: 8px 10px; min-width: 90px; }
        .svaerhed-boks .navn { font-size: 12px; }
        .tabs { flex-wrap: wrap; gap: 4px; }
        .tab { flex: 1 1 auto; min-width: 80px; text-align: center; font-size: 12px; padding: 6px 10px; }
        .gt-card { min-width: 90px; padding: 10px; }
        .gt-card .gt-name { font-size: 12px; }
        .gt-card .gt-emoji { font-size: 22px; }
        .box div[style*="display:flex"][style*="gap:15px"] { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; max-width: 250px; margin: 0 auto; }
        #plotCanvas { height: 250px !important; }
        .plot-tabs { flex-wrap: wrap; }
        .plot-tabs .tab:first-child { flex: 0 0 100%; margin-bottom: 4px; }
        .plot-tabs .tab:not(:first-child) { flex: 1 1 30%; }
    }

    button, .btn { touch-action: manipulation; }
    html, body { touch-action: pan-y; }
    </style>
</head>

// ========== HOLDOPSTILLING PER GT ==========

// Vælg 8 ryttere til et hold for en given GT
function vaelgHoldtrup(holdNavn, gtId, saesonNr) {
    var team = TEAMS[holdNavn];
    if (!team) return [];
    
    var pool = team.r;
    
    // Score hver rytter baseret på GT-præference
    var scored = [];
    for (var i = 0; i < pool.length; i++) {
        var r = pool[i];
        var score = 0;
        
        // Primær GT = høj score
        if (r.pri === gtId) score += 100;
        
        // Foretrukken GT = middel score
        if (r.pref && r.pref.indexOf(gtId) >= 0) score += 50;
        
        // Tilfældig variation (10% per sæson - simulerer form/skader)
        score += ri(-15, 15);
        
        // Stærkere ryttere foretrækkes generelt
        var styrke = (r.gc + r.bj + r.sp + r.tt) / 4;
        score += styrke * 0.3;
        
        scored.push({ rytter: r, score: score, idx: i });
    }
    
    // Sortér efter score (højeste først)
    scored.sort(function(a, b) { return b.score - a.score; });
    
    // Vælg de 8 bedste
    var valgte = [];
    for (var i = 0; i < Math.min(8, scored.length); i++) {
        valgte.push(scored[i].rytter);
    }
    
    return valgte;
}

// Bestem hvilke GT'er hver AI-rytter kører denne sæson
function bestemAIGTdeltagelse(saesonNr) {
    var aiGT = {}; // rytternavn -> [gt1, gt2]
    var hn = Object.keys(TEAMS);
    
    for (var hi = 0; hi < hn.length; hi++) {
        var holdNavn = hn[hi];
        var pool = TEAMS[holdNavn].r;
        
        for (var ri2 = 0; ri2 < pool.length; ri2++) {
            var r = pool[ri2];
            var gts = [];
            
            // Primær GT: altid med (95% chance)
            if (Math.random() < 0.95) {
                gts.push(r.pri);
            }
            
            // Sekundær GT: 40% chance (fra pref-listen)
            if (r.pref && r.pref.length > 1 && Math.random() < 0.40) {
                var sekundaer = r.pref[1]; // Anden foretrukne GT
                if (gts.indexOf(sekundaer) < 0) {
                    gts.push(sekundaer);
                }
            }
			
            // Wildcard: 10% chance for at Pogačar/Vingegaard
            // dukker op i en uventet GT
            if (r.gc >= 95 && Math.random() < 0.50) {
                var alleGT = ["giro", "tdf", "vuelta"];
                var tilfaeldig = alleGT[ri(0, 2)];
                if (gts.indexOf(tilfaeldig) < 0) {
                    gts.push(tilfaeldig);
                }
            }
            
            // Ingen rytter kører alle 3
            if (gts.length > 2) gts = gts.slice(0, 2);
            
            // Mindst 1 GT
            if (gts.length === 0) gts.push(r.pri);
            
            aiGT[r.n] = gts;
        }
    }
    
    return aiGT;
}

// Generer feltet for en given GT (alle hold vælger 8 ryttere)
function genererFelt(gtId, spillerHoldNavn, spillerOrigNavn) {
    var ryttere = [];
    var sprPts = {};
    var bjgPts = {};
    var hn = Object.keys(TEAMS);
    
    for (var hi = 0; hi < hn.length; hi++) {
        var holdNavn = hn[hi];
        var team = TEAMS[holdNavn];
	    if (team.wildcard && team.wildcard.indexOf(gtId) < 0) continue;
        var trup = vaelgHoldtrup(holdNavn, gtId, G.saeson);
        var erSpillerHold = (holdNavn === spillerHoldNavn);
        
        // SIKR at spillerens rytter ALTID er med i truppen
        if (erSpillerHold) {
            var spillerIMed = false;
            for (var ti = 0; ti < trup.length; ti++) {
                if (trup[ti].n === spillerOrigNavn) { spillerIMed = true; break; }
            }
            if (!spillerIMed) {
                // Find spillerens rytter i poolen og tilføj
                for (var pi = 0; pi < team.r.length; pi++) {
                    if (team.r[pi].n === spillerOrigNavn) {
                        // Erstat den svageste i truppen
                        trup[trup.length - 1] = team.r[pi];
                        break;
                    }
                }
            }
        }
        
        for (var ri2 = 0; ri2 < trup.length; ri2++) {
            var x = trup[ri2];
            var erSpiller = (erSpillerHold && x.n === spillerOrigNavn);
            
            var r = {
                navn: erSpiller ? G.navn : x.n,
                orig: x.n,
                hold: holdNavn,
                holdAbbr: team.abbr,
                holdClr: team.clr,
                sp: erSpiller,
                gc: x.gc + ri(-2,2),
                bj: x.bj + ri(-2,2),
                spr: x.sp + ri(-2,2),
                tt: x.tt + ri(-2,2),
                ud: x.ud + ri(-2,2),
                re: x.re + ri(-2,2),
                fl: x.fl + ri(-2,2),
                energi: 100,
                stid: 0,
                gi: 0,
                heltFaerdig: false,
                ude: false,
                styrt: false
            };
            
            if (erSpiller && G.spiller) {
                r.gc = G.spiller.gc;
                r.bj = G.spiller.bj;
                r.spr = G.spiller.spr;
                r.tt = G.spiller.tt;
                r.ud = G.spiller.ud;
                r.re = G.spiller.re;
                r.fl = G.spiller.fl;
            }
            
            if (erSpiller && G.aktuelGTIdx > 0) {
                var tidligereGT = G.valgteGT[G.aktuelGTIdx - 1];
                var key = tidligereGT + "_" + gtId;
                var traethed = GT_TRAETHED[key];
                if (traethed) {
                    r.energi = Math.round(getMaxEnergi(r) * traethed.energiStart);
                }
            } else if (!erSpiller) {
                var aiGTs = G.aiRytterGT[x.n];
                if (aiGTs && aiGTs.length >= 2) {
                    var gtOrdre = ["giro","tdf","vuelta"];
                    var aktueltIdx = gtOrdre.indexOf(gtId);
                    for (var gi = 0; gi < aiGTs.length; gi++) {
                        var tidligereIdx = gtOrdre.indexOf(aiGTs[gi]);
                        if (tidligereIdx < aktueltIdx) {
                            var tKey = aiGTs[gi] + "_" + gtId;
                            var tTraethed = GT_TRAETHED[tKey];
                            if (tTraethed) {
                                r.energi = Math.round(100 * tTraethed.energiStart);
                            }
                            break;
                        }
                    }
                }
            }
            
            ryttere.push(r);
            sprPts[r.navn] = 0;
            bjgPts[r.navn] = 0;
            if (erSpiller) G.spiller = r;
        }
    }
    
    return { ryttere: ryttere, sprPts: sprPts, bjgPts: bjgPts };
}

// ========== ETAPEGENERERING PER GT ==========

function genEForGT(gtId) {
    var gt = GT_CONFIG[gtId];
    
    var typer = [];
    var antalBjerg = ri(7, 9);
    var antalKuperet = ri(5, 6);
    var antalTT = 2;
    var antalFlad = 21 - antalBjerg - antalKuperet - antalTT;
    if (antalFlad < 4) {
        var diff = 4 - antalFlad;
        if (antalBjerg > 5) { antalBjerg -= Math.min(diff, antalBjerg - 5); diff = 4 - (21 - antalBjerg - antalKuperet - antalTT); }
        if (diff > 0 && antalKuperet > 4) { antalKuperet -= Math.min(diff, antalKuperet - 4); }
        antalFlad = 21 - antalBjerg - antalKuperet - antalTT;
    }
    
    for (var i = 0; i < antalFlad; i++) typer.push("flad");
    for (var i = 0; i < antalKuperet; i++) typer.push("kuperet");
    for (var i = 0; i < antalBjerg; i++) typer.push("bjerg");
    typer = sh(typer);
    
    var flatCount = 0;
    for (var i = typer.length - 1; i >= 0; i--) {
        if (typer[i] === "flad" && flatCount < 2) { typer.splice(i, 1); flatCount++; }
    }
    
    var endelig = new Array(21);
    endelig[0] = "flad";
    endelig[20] = "flad";
    
    // Giro: Sidste etape er ofte enkeltstart
    if (gtId === "giro") {
        endelig[20] = "tt";
        var tt1Pos = ri(3, 8);
        endelig[tt1Pos] = "tt";
        // Fjern en flad for at kompensere
        var fladIdx = -1;
        for (var i = typer.length - 1; i >= 0; i--) {
            if (typer[i] === "flad") { fladIdx = i; break; }
        }
        if (fladIdx >= 0) typer.splice(fladIdx, 1);
    } else {
        var tt1Pos = ri(3, 7);
        endelig[tt1Pos] = "tt";
        var tt2Min = Math.max(15, tt1Pos + 5);
        var tt2Max = 19;
        if (tt2Min > tt2Max) tt2Min = tt2Max;
        var tt2Pos = ri(tt2Min, tt2Max);
        endelig[tt2Pos] = "tt";
    }
    
    var typerIdx = 0;
    for (var i = 0; i < 21; i++) {
        if (endelig[i]) continue;
        if (typerIdx < typer.length) {
            endelig[i] = typer[typerIdx];
            typerIdx++;
        } else {
            endelig[i] = "flad";
        }
    }
    
    // Byer fra GT-konfiguration
    var byer = sh(gt.normaleByer.slice());
    var bjergT = sh(gt.bjergToppe.slice());
    var bjergTopIdx = 0;
    
    var brugteByer = [byer.shift()];
    for (var i = 0; i < endelig.length; i++) {
        if (endelig[i] === "bjerg" && Math.random() < 0.4 && bjergTopIdx < bjergT.length) {
            brugteByer.push(bjergT[bjergTopIdx]);
            bjergTopIdx++;
        } else if (byer.length > 0) {
            brugteByer.push(byer.shift());
        } else {
            brugteByer.push(gt.slutBy);
        }
    }
    brugteByer[21] = gt.slutBy;
    
    var result = [];
    for (var i = 0; i < endelig.length; i++) {
        var x = endelig[i];
        result.push({ 
            nr: i+1, type: x, 
            start: i === 0 ? brugteByer[0] : brugteByer[i], 
            slut: brugteByer[i + 1] || gt.slutBy, 
            dist: x === "tt" ? ri(28,42) : x === "bjerg" ? ri(155,180) : ri(170,210) 
        });
    }
    return result;
}

// ========== RESTITUTION MED TRÆTHED ==========
// Erstat den originale restitutionsberegning i afslut() og afslutTT()

function beregnRestitution(rytter) {
    var mult = rytter.sp ? getSvaerhedMultiplier() : 1.0;
    var rest = (rytter.re / 100 * 28 + 12) * mult;
    
    // Træthed fra 2. GT i sæsonen
    if (G.aktuelGTIdx > 0) {
        var tidligereGT = G.valgteGT[G.aktuelGTIdx - 1];
        var key = tidligereGT + "_" + G.aktuelGT;
        var traethed = GT_TRAETHED[key];
        if (traethed) {
            // AI-ryttere får også reduceret restitution
            rest *= traethed.restitutionMult;
        }
    }
    
    return rest;
}

// ========== TILPASSET genererResume() ==========
// Kun de dele der refererer til trøjer/løbsnavn ændres.
// Her er de relevante udskiftninger som skal foretages i genererResume():

// Erstatter: "den gule trøje" → gcNavn() i dynamisk kontekst
// Erstatter: "pointkonkurrencen" → spNavn()
// Erstatter: "bjergkonkurrencen" → bjNavn()
// Erstatter: "Touren" / "Tour de France" → loebNavn() / loebNavnBestemt()

// I stedet for at kopiere hele den 500-linje funktion, er her de specifikke linjer:

function getTroejeVerb(erFoersteEtape, tidligereLeder, nuLeder) {
    if (erFoersteEtape) return "tager";
    if (!tidligereLeder) return "har";
    if (nuLeder === tidligereLeder) return "beholder";
    return "erobrer";
}

// Denne funktion genererer trøje-tekst til resumé (erstatter hardcoded trøjenavne)
function genererTroejeTekst(gcS, spS, bjS, erFoersteEtape, tidligereGcLeder, tidligereSpLeder, tidligereBjLeder) {
    var gt = getGT();
    var gcLeder = gcS[0];
    var spLeder = spS.length > 0 && (G.sprPts[spS[0].navn] || 0) > 0 ? spS[0] : null;
    var bjLeder = bjS.length > 0 && (G.bjgPts[bjS[0].navn] || 0) > 0 ? bjS[0] : null;
    
    var tekst = "";
    
    if (gcLeder) {
        var gcNr2 = gcS[1];
        var gcGap = gcNr2 ? Math.round(gcNr2.stid - gcLeder.stid) : 0;
        var gcLederNavn = gcLeder.navn.split(" ").pop();
        var gcVerb = getTroejeVerb(erFoersteEtape, tidligereGcLeder, gcLeder.navn);
        
        // Brug GT-specifikt trøjenavn
        var troejeNavn = gt.gcNavn;
        tekst = gcLederNavn + " " + gcVerb + " " + troejeNavn;
        
        if (gcGap === 0 && gcNr2) {
            tekst += " med samme tid som " + gcNr2.navn.split(" ").pop() + "!";
        } else if (gcGap < 60 && gcNr2) {
            tekst += " med kun " + gcGap + " sekunder ned til " + gcNr2.navn.split(" ").pop() + ".";
        } else if (gcNr2) {
            tekst += " med " + ft(gcGap) + " til " + gcNr2.navn.split(" ").pop() + ".";
        } else {
            tekst += ".";
        }
    }
    
    if (spLeder) {
        var spNr2 = spS[1];
        var spGap = spNr2 ? (G.sprPts[spLeder.navn] || 0) - (G.sprPts[spNr2.navn] || 0) : 0;
        var spLederNavn = spLeder.navn.split(" ").pop();
        var spVerb = "fører";
        if (!erFoersteEtape && tidligereSpLeder && tidligereSpLeder !== spLeder.navn) {
            spVerb = "overtager føringen i";
        }
        tekst += " " + spLederNavn + " " + spVerb + " " + gt.spNavn + ".";
    }
    
    if (bjLeder) {
        var bjLederNavn = bjLeder.navn.split(" ").pop();
        var bjVerb = "er i front i";
        if (!erFoersteEtape && tidligereBjLeder && tidligereBjLeder !== bjLeder.navn) {
            bjVerb = "overtager føringen i";
        }
        tekst += " " + bjLederNavn + " " + bjVerb + " " + gt.bjNavn + ".";
    }
    
    return tekst;
}

// ========== TILPASNING AF genererTourResume() → genererGTResume() ==========

function genererGTResume() {
    var gt = getGT();
    var spiEfternavn = G.navn.split(" ").pop();
    var aktive = G.ryttere.filter(function(r) { return !r.ude; });
    var gcS = aktive.slice().sort(function(a,b) { return a.stid - b.stid; });
    var spS = aktive.slice().sort(function(a,b) { return (G.sprPts[b.navn]||0) - (G.sprPts[a.navn]||0); });
    var bjS = aktive.slice().sort(function(a,b) { return (G.bjgPts[b.navn]||0) - (G.bjgPts[a.navn]||0); });
    
    var spiGC = -1;
    for (var i = 0; i < gcS.length; i++) { if (gcS[i].sp) { spiGC = i; break; } }
    
    var spiSp = -1;
    for (var i = 0; i < spS.length; i++) { if (spS[i].sp) { spiSp = i; break; } }
    
    var spiBj = -1;
    for (var i = 0; i < bjS.length; i++) { if (bjS[i].sp) { spiBj = i; break; } }
    
    // Tæl etapesejre og podier
    var sejre = 0, podier = 0, top10 = 0;
    for (var i = 0; i < ETAPE_HISTORIK.length; i++) {
        var eh = ETAPE_HISTORIK[i];
        if (eh.spiEtapePlads === 1) sejre++;
        if (eh.spiEtapePlads <= 3) podier++;
        if (eh.spiEtapePlads <= 10) top10++;
    }
    
    // Trøjedage
    var guleDage = 0, groenneDage = 0, prikkede = 0;
    for (var i = 0; i < ETAPE_HISTORIK.length; i++) {
        if (ETAPE_HISTORIK[i].gcLeder === G.spiller.navn) guleDage++;
        if (ETAPE_HISTORIK[i].spLeder === G.spiller.navn) groenneDage++;
        if (ETAPE_HISTORIK[i].bjLeder === G.spiller.navn) prikkede++;
    }
    
    var afsnit = [];
    var overskrift = "";
    
    if (spiGC === 0) {
        overskrift = "🏆 HISTORISK! " + G.navn.toUpperCase() + " VINDER " + gt.navn.toUpperCase() + "!";
        afsnit.push("Efter tre uger og 21 etaper kan " + G.navn + " kalde sig vinder af " + gt.loebNavnBestemt + "! En fantastisk præstation.");
    } else if (spiGC <= 2) {
        overskrift = "🎖️ " + spiEfternavn + " på podiet i " + gt.slutBy + "!";
        var podiePlads = spiGC === 1 ? "andenpladsen" : "tredjepladsen";
        afsnit.push(G.navn + " kan se tilbage på et succesfuldt " + gt.loebNavnBestemt + " med " + podiePlads + " i det samlede klassement.");
    } else if (spiGC <= 9) {
        overskrift = spiEfternavn + " slutter i Top 10";
        afsnit.push(G.navn + " har gennemført årets " + gt.loebNavnBestemt + " og slutter på en " + (spiGC + 1) + ". plads samlet.");
    } else if (sejre > 0) {
        overskrift = spiEfternavn + " tager " + sejre + " etapesejr" + (sejre > 1 ? "e" : "") + " i " + gt.kort;
        afsnit.push(G.navn + " har gennemført " + gt.loebNavnBestemt + " med " + sejre + " etapesejr" + (sejre > 1 ? "e" : "") + ".");
    } else {
        overskrift = spiEfternavn + " gennemfører " + gt.loebNavnBestemt;
        afsnit.push(G.navn + " har gennemført årets " + gt.loebNavnBestemt + " på en " + (spiGC + 1) + ". plads samlet.");
    }
    
    // Statistik
    var statTekst = "Gennem de 21 etaper opnåede " + spiEfternavn + " ";
    var stats = [];
    if (sejre > 0) stats.push(sejre + " etapesejr" + (sejre > 1 ? "e" : ""));
    if (podier > sejre) stats.push((podier - sejre) + " yderligere podieplacering" + (podier - sejre > 1 ? "er" : ""));
    if (top10 > podier) stats.push((top10 - podier) + " yderligere top-10 placering" + (top10 - podier > 1 ? "er" : ""));
    
    if (stats.length >= 1) {
        statTekst += stats.join(", ") + ".";
        afsnit.push(statTekst);
    }
    
    // Trøjer vundet
    var vindere = [];
    if (gcS[0] && gcS[0].sp) vindere.push(gt.gcNavn);
    if (spS[0] && spS[0].sp) vindere.push(gt.spNavn);
    if (bjS[0] && bjS[0].sp) vindere.push(gt.bjNavn);
    
    if (vindere.length > 0) {
        var troejeTekst = "Ved afslutningen i " + gt.slutBy + " kunne " + spiEfternavn + " fejre triumfen i ";
        if (vindere.length === 1) troejeTekst += vindere[0] + ".";
        else if (vindere.length === 2) troejeTekst += "både " + vindere[0] + " og " + vindere[1] + ".";
        else troejeTekst += vindere[0] + ", " + vindere[1] + " og " + vindere[2] + "!";
        afsnit.push(troejeTekst);
    }
    
    // Trøjedage
    if (guleDage > 0 || groenneDage > 0 || prikkede > 0) {
        var dagTekst = "";
        if (guleDage > 0) dagTekst += spiEfternavn + " bar " + gt.gcNavn + " i " + guleDage + " dag" + (guleDage > 1 ? "e" : "") + ". ";
        if (groenneDage > 0) dagTekst += gt.spNavn + " blev båret i " + groenneDage + " dag" + (groenneDage > 1 ? "e" : "") + ". ";
        if (prikkede > 0) dagTekst += gt.bjNavn + " prydede skuldrene i " + prikkede + " dag" + (prikkede > 1 ? "e" : "") + ". ";
        afsnit.push(dagTekst.trim());
    }
    
    return {
        overskrift: overskrift,
        tekst: afsnit.join("\n\n"),
        stats: {
            gtId: gt.id,
            gcPlads: spiGC + 1,
            spPlads: spiSp + 1,
            bjPlads: spiBj + 1,
            sejre: sejre,
            podier: podier,
            top10: top10,
            guleDage: guleDage,
            groenneDage: groenneDage,
            prikkede: prikkede
        }
    };
}

// ========== TILPASNING AF rend() ==========
// Felt-farven er nu altid cyan i stedet for blå

function getGruppeFarve(g, spiller, gcLeder, spLeder, bjLeder) {
    var gt = getGT();
    
    if (g.ryt.indexOf(spiller) >= 0) {
        return { border: "#fff", bg: "#222", text: "#fff" };
    }
    
    var harGC = false, harSp = false, harBj = false;
    for (var i = 0; i < g.ryt.length; i++) {
        var r = g.ryt[i];
        if (r === gcLeder) harGC = true;
        if (r === spLeder) harSp = true;
        if (r === bjLeder) harBj = true;
    }
    
    if (harGC) {
        return { border: gt.gcColor, bg: gt.bg, text: gt.gcColor };
    }
    if (harSp) {
        return { border: gt.spColor, bg: "#020", text: gt.spColor };
    }
    if (harBj) {
        return { border: gt.bjColor, bg: "#002", text: gt.bjColor };
    }
    
    if (g.type === "gruppetto") {
        return { border: "#888", bg: "#111", text: "#888" };
    }
    if (g.type === "felt") {
        return { border: "#0cc", bg: "#023", text: "#0cc" };
    }
    if (g.type === "udbrud") {
        return { border: "#f80", bg: "#210", text: "#f80" };
    }
    
    return { border: "#888", bg: "#111", text: "#888" };
}

function erstatTroejeTekster(tekst) {
    var gt = getGT();
    tekst = tekst.replace(/den gule trøje/g, gt.gcNavn);
    tekst = tekst.replace(/den grønne trøje/g, gt.spNavn);
    tekst = tekst.replace(/den prikkede trøje/g, gt.bjNavn);
    tekst = tekst.replace(/den prikkede bjergtrøje/g, gt.bjNavn);
    tekst = tekst.replace(/pointkonkurrencen/g, gt.spNavn);
    tekst = tekst.replace(/bjergkonkurrencen/g, gt.bjNavn);
    tekst = tekst.replace(/TOUR DE FRANCE/g, gt.navn.toUpperCase());
    tekst = tekst.replace(/Tour de France/g, gt.loebNavnBestemt);
    tekst = tekst.replace(/i denne Tour/g, "i dette års " + gt.kort);
    tekst = tekst.replace(/denne Tour/g, "dette års " + gt.kort);
    tekst = tekst.replace(/Touren/g, gt.loebNavn);
    return tekst;
}

    html = html.replace(/🟡 SAMLET/g, gt.gcEmoji + ' SAMLET');
    html = html.replace(/🟢 POINTKONKURRENCEN/g, gt.spEmoji + ' ' + gt.spNavn.toUpperCase());
    html = html.replace(/🔴 BJERGKONKURRENCEN/g, gt.bjEmoji + ' ' + gt.bjNavn.toUpperCase());
    html = html.replace(/🟡 ALLE/g, gt.gcEmoji + ' ALLE');
    
    // Løbsnavne
    html = html.replace(/TOUR DE FRANCE SLUT!/g, gt.navn.toUpperCase() + ' SLUT!');
    html = html.replace(/TOUR DE FRANCE/g, gt.loebNavnBestemt);
    html = html.replace(/Tour de France/g, gt.loebNavnBestemt);
    html = html.replace(/TOUREN ER SLUT FOR DIG/g, gt.loebNavn.toUpperCase() + ' ER SLUT FOR DIG');
    html = html.replace(/DU VANDT TOUREN!/g, 'DU VANDT ' + gt.kort.toUpperCase() + '!');
    html = html.replace(/forlade Touren/g, 'forlade ' + gt.loebNavn);
    html = html.replace(/Touren/g, gt.loebNavn);
    
    // Trøjenavne i tekst
    html = html.replace(/GUL TRØJE/g, gt.gcNavn.toUpperCase());
    html = html.replace(/GRØN TRØJE/g, gt.spNavn.toUpperCase());
    html = html.replace(/PRIKKET TRØJE/g, gt.bjNavn.toUpperCase());

    html = html.replace(/border:2px solid #aa0/g, 'border:2px solid ' + gt.secondary);

    return html;
}

// ========== NAVIGATION MELLEM GT'er OG SÆSONER ==========

function naesteGrandTour() {
    G.aktuelGTIdx++;
    G.aktuelGT = G.valgteGT[G.aktuelGTIdx];
    startGrandTour();
}

function naeste() {
    G.enr++;
    G.stilTab = "gc";
    startEtape();
}

function afslutGrandTour() {
    // Beregn bonus for denne GT
    var gt = getGT();
    var aktive = G.ryttere.filter(function(r) { return !r.ude; });
    var gcS = aktive.slice().sort(function(a,b) { return a.stid - b.stid; });
    var spS = aktive.slice().sort(function(a,b) { return (G.sprPts[b.navn]||0) - (G.sprPts[a.navn]||0); });
    var bjS = aktive.slice().sort(function(a,b) { return (G.bjgPts[b.navn]||0) - (G.bjgPts[a.navn]||0); });
    
    var spiGC = -1;
    for (var i = 0; i < gcS.length; i++) { if (gcS[i].sp) { spiGC = i; break; } }
    
    var bonusGC = 0;
    if (spiGC >= 0 && spiGC < gt.gcPoint.length) {
        bonusGC = gt.gcPoint[spiGC];
    }
    
    var bonusSp = (spS.length > 0 && spS[0].sp) ? gt.troeje : 0;
    var bonusBj = (bjS.length > 0 && bjS[0].sp) ? gt.troeje : 0;
    
    var etapeSejre = 0;
    for (var i = 0; i < ETAPE_HISTORIK.length; i++) {
        if (ETAPE_HISTORIK[i].spiEtapePlads === 1) etapeSejre++;
    }
    var bonusSejre = etapeSejre * gt.etapeSejr;
    var bonusGennemfoer = G.spiller.ude ? 0 : gt.gennemfoer;
    
    var totalBonus = bonusGC + bonusSp + bonusBj + bonusSejre + bonusGennemfoer;
    
    // Gem resultat
    var resultat = {
        gtId: G.aktuelGT,
        udgaaet: false,
        gcPlads: spiGC + 1,
        spPlads: (function() { for (var i = 0; i < spS.length; i++) { if (spS[i].sp) return i + 1; } return -1; })(),
        bjPlads: (function() { for (var i = 0; i < bjS.length; i++) { if (bjS[i].sp) return i + 1; } return -1; })(),
        sejre: etapeSejre,
        bonus: totalBonus,
        bonusDetaljer: {
            gc: bonusGC,
            sp: bonusSp,
            bj: bonusBj,
            sejre: bonusSejre,
            gennemfoer: bonusGennemfoer
        },
        etapeHistorik: ETAPE_HISTORIK.slice()
    };
    G.saesonResultater.push(resultat);
    
    // Har vi flere GT'er at køre?
    if (G.aktuelGTIdx < G.valgteGT.length - 1) {
        // Vis resultat og gå videre til næste GT
        visGTResultatOgGaaVidere(resultat);
    } else {
        // Sæsonafslutning
        afslutSaeson();
    }
}

function visGTResultatOgGaaVidere(resultat) {
    var gt = getGT();
    var naesteGT = GT_CONFIG[G.valgteGT[G.aktuelGTIdx + 1]];
    
    var html = '<div style="text-align:center;padding:15px 0">' +
        '<div style="font-size:40px">' + gt.emoji + '</div>' +
        '<h1 style="color:' + gt.primary + '">' + gt.navn.toUpperCase() + ' SLUT!</h1>' +
    '</div>';
    
    html += '<div class="box" style="text-align:center">' +
        '<h3>Din placering: ' + resultat.gcPlads + '. plads</h3>' +
        '<p>Bonus fra ' + gt.kort + ': <span class="hl">' + resultat.bonus + ' point</span></p>' +
    '</div>';
    
    html += '<div class="box" style="border-color:' + naesteGT.primary + ';text-align:center">' +
        '<h3 style="color:' + naesteGT.primary + '">' + naesteGT.emoji + ' Næste op: ' + naesteGT.navn + '</h3>' +
        '<p style="color:#888">Træthed: Startenergi ' + Math.round(GT_TRAETHED[G.aktuelGT + "_" + naesteGT.id].energiStart * 100) + '%</p>' +
    '</div>';
    
    html += '<div class="ctrls">' +
        '<button class="btn btn-big" onclick="visTourResume()">📰 REFERAT</button>' +
        '<button class="btn btn-big btn-y" onclick="naesteGrandTour()">START ' + naesteGT.kort.toUpperCase() + '</button>' +
    '</div>';
    
    R(html);
}

// ========== SÆSONAFSLUTNING ==========

function afslutSaeson() {
    // Beregn samlet bonus for hele sæsonen
    var samletBonus = 0;
    for (var i = 0; i < G.saesonResultater.length; i++) {
        samletBonus += (G.saesonResultater[i].bonus || 0);
    }
    
    G.bonusPoint = samletBonus;
    
    // Gem i karrierehistorik
    G.karriereHistorik.push({
        saeson: G.saeson,
        resultater: G.saesonResultater.slice(),
        bonusPoint: samletBonus
    });
    
    visSaesonOversigt();
}

function visSaesonOversigt() {
    var html = '<div style="text-align:center;padding:15px 0">' +
        '<h1>SÆSON ' + G.saeson + ' (' + (2025 + G.saeson) + ') AFSLUTTET</h1>' +
    '</div>';
    
    // Vis resultater fra hver GT
    for (var i = 0; i < G.saesonResultater.length; i++) {
        var res = G.saesonResultater[i];
        var gt = GT_CONFIG[res.gtId];
        
        html += '<div class="box" style="border-color:' + gt.primary + '">' +
            '<h3 style="color:' + gt.primary + '">' + gt.emoji + ' ' + gt.navn + '</h3>';
        
        if (res.udgaaet) {
            html += '<p style="color:#f44">💀 Udgået</p>';
        } else {
            html += '<p>GC: <span class="hl">' + res.gcPlads + '.</span> plads</p>';
            if (res.sejre > 0) html += '<p>Etapesejre: <span class="hl">' + res.sejre + '</span></p>';
            html += '<p>Bonus: <span class="hl">+' + res.bonus + ' point</span></p>';
            
            // Detaljer
            if (res.bonusDetaljer) {
                var dele = [];
                if (res.bonusDetaljer.gc > 0) dele.push(res.bonusDetaljer.gc + " for GC");
                if (res.bonusDetaljer.sp > 0) dele.push(res.bonusDetaljer.sp + " for sprinttrøje");
                if (res.bonusDetaljer.bj > 0) dele.push(res.bonusDetaljer.bj + " for bjergtrøje");
                if (res.bonusDetaljer.sejre > 0) dele.push(res.bonusDetaljer.sejre + " for etapesejre");
                if (res.bonusDetaljer.gennemfoer > 0) dele.push(res.bonusDetaljer.gennemfoer + " for gennemførelse");
                if (dele.length > 0) {
                    html += '<p style="color:#888;font-size:11px">(' + dele.join(", ") + ')</p>';
                }
            }
        }
        html += '</div>';
    }
    
    // Samlet bonus
    var samletBonus = G.bonusPoint;
    html += '<div class="box" style="border-color:#0f0;text-align:center">' +
        '<h3 style="color:#0f0">🎁 Samlet bonus: ' + samletBonus + ' point</h3>' +
    '</div>';
    
    // Knapper
    if (G.saeson >= 10) {
        html += '<div class="box" style="text-align:center;border-color:#f80">' +
            '<h3 style="color:#f80">🎖️ Karrieren er slut!</h3>' +
            '<p>' + G.navn + ' trækker sig tilbage.</p>' +
        '</div>' +
        '<div class="ctrls">' +
            '<button class="btn btn-big btn-y" onclick="location.reload()">NY KARRIERE</button>' +
        '</div>';
    } else if (samletBonus > 0) {
        html += '<div class="ctrls">' +
            '<button class="btn btn-big btn-y" onclick="fordelPoint()">FORDEL POINT</button>' +
        '</div>';
    } else {
        html += '<div class="ctrls">' +
            '<button class="btn btn-big btn-y" onclick="nySaeson()">SÆSON ' + (G.saeson + 1) + '</button>' +
        '</div>';
    }
    
    R(html);
}

function nySaeson() {
    G.saeson++;
    G.tourNr = G.saeson; // Legacy compat
    G.valgteGT = [];
    G.aktuelGTIdx = 0;
    G.saesonResultater = [];
    
    visSaesonValg();
}

function startGame() {

    G.saesonResultater = [];
    G.valgteGT = [];
    
    // Vælg hold og rytter (som før)
    var hn = Object.keys(TEAMS);
    var holdNavn = hn[ri(0, hn.length-1)];
    var hd = TEAMS[holdNavn];
    var ridx = ri(4, Math.min(hd.r.length - 1, 11)); // Fra pool (4-11)
    var rd = hd.r[ridx];
    
    // Opret spillerens base-stats (bruges i alle GT'er)
    G.spiller = {
        navn: G.navn,
        orig: rd.n,
        hold: holdNavn,
        holdAbbr: hd.abbr,
        holdClr: hd.clr,
        sp: true,
        gc: rd.gc + ri(-2,2),
        bj: rd.bj + ri(-2,2),
        spr: rd.sp + ri(-2,2),
        tt: rd.tt + ri(-2,2),
        ud: rd.ud + ri(-2,2),
        re: rd.re + ri(-2,2),
        fl: rd.fl + ri(-2,2),
        energi: 100,
        stid: 0,
        gi: 0,
        ude: false
    };
    
    rytterInfo(holdNavn, rd);
}

// ========== SEKTION 4: GEM/HENT, SIMULERINGSMOTOR-TILPASNINGER ==========

// ========== UDVIDET GEM/HENT ==========

function gemSpil(etapeFaerdig) {
    var saveData = {
        version: 3, // Opdateret version for GrandTours
        navn: G.navn,
        saeson: G.saeson,
        tourNr: G.tourNr,
        enr: G.enr,
        etapeFaerdig: etapeFaerdig || false,
        stilTab: G.stilTab,
        sprPts: G.sprPts,
        bjgPts: G.bjgPts,
        svaerhed: G.svaerhed,
        // GT-system
        valgteGT: G.valgteGT,
        aktuelGTIdx: G.aktuelGTIdx,
        aktuelGT: G.aktuelGT,
        saesonResultater: G.saesonResultater,
        karriereHistorik: G.karriereHistorik,
        aiRytterGT: G.aiRytterGT,
        bonusPoint: G.bonusPoint || 0,
        etapeHistorik: ETAPE_HISTORIK,
        // Spillerens permanente stats
        spillerStats: {
            gc: G.spiller.gc,
            bj: G.spiller.bj,
            spr: G.spiller.spr,
            tt: G.spiller.tt,
            ud: G.spiller.ud,
            re: G.spiller.re,
            fl: G.spiller.fl,
            hold: G.spiller.hold,
            holdAbbr: G.spiller.holdAbbr,
            holdClr: G.spiller.holdClr,
            orig: G.spiller.orig
        },
        // Ryttere i nuværende GT
        ryttere: [],
        etaper: G.etaper
    };
    
    for (var i = 0; i < G.ryttere.length; i++) {
        var r = G.ryttere[i];
        saveData.ryttere.push({
            navn: r.navn,
            orig: r.orig,
            hold: r.hold,
            holdAbbr: r.holdAbbr,
            holdClr: r.holdClr,
            sp: r.sp,
            gc: r.gc,
            bj: r.bj,
            spr: r.spr,
            tt: r.tt,
            ud: r.ud,
            re: r.re,
            fl: r.fl,
            energi: r.energi,
            stid: r.stid,
            ude: r.ude
        });
    }
    
    localStorage.setItem('grandToursSave', JSON.stringify(saveData));
}

function hentSpil() {
    // KUN læs fra den nye save-key
    var saved = localStorage.getItem('grandToursSave');
    if (!saved) return null;
    
    try {
        return JSON.parse(saved);
    } catch (e) {
        console.error('Fejl ved indlæsning af gemt spil:', e);
        return null;
    }
}

function sletGemtSpil() {
    localStorage.removeItem('grandToursSave');
}

function harGemtSpil() {
    return localStorage.getItem('grandToursSave') !== null;
}

function indlaesGemtSpil() {
    var saveData = hentSpil();
    if (!saveData) return false;
    
    var CURRENT_VERSION = 3;
    if (!saveData.version || saveData.version < CURRENT_VERSION) {
        // Gammelt format (inkl. LeTour v2) - kan ikke bruges
        console.log('Inkompatibelt save format (v' + (saveData.version || '?') + ') - sletter');
        sletGemtSpil();
        return false;
    }
    
    G.navn = saveData.navn;
    G.saeson = saveData.saeson || 1;
    G.tourNr = saveData.tourNr || G.saeson;
    G.enr = saveData.enr;
    G.stilTab = saveData.stilTab || "gc";
    G.sprPts = saveData.sprPts;
    G.bjgPts = saveData.bjgPts;
    G.etaper = saveData.etaper;
    G.svaerhed = saveData.svaerhed || "normal";
    ETAPE_HISTORIK = saveData.etapeHistorik || [];
    G.bonusPoint = saveData.bonusPoint || 0;
    
    // GT-system
    G.valgteGT = saveData.valgteGT || ["tdf"];
    G.aktuelGTIdx = saveData.aktuelGTIdx || 0;
    G.aktuelGT = saveData.aktuelGT || "tdf";
    G.saesonResultater = saveData.saesonResultater || [];
    G.karriereHistorik = saveData.karriereHistorik || [];
    G.aiRytterGT = saveData.aiRytterGT || {};
    
    // Sæt GT-tema
    setGTTema(G.aktuelGT);
    
    // Genopret ryttere
    G.ryttere = [];
    for (var i = 0; i < saveData.ryttere.length; i++) {
        var r = saveData.ryttere[i];
        G.ryttere.push(r);
        if (r.sp) G.spiller = G.ryttere[G.ryttere.length - 1];
    }
    
    // Genopret spillerens permanente stats fra save
    if (saveData.spillerStats && G.spiller) {
        G.spiller.hold = saveData.spillerStats.hold;
        G.spiller.holdAbbr = saveData.spillerStats.holdAbbr;
        G.spiller.holdClr = saveData.spillerStats.holdClr;
        G.spiller.orig = saveData.spillerStats.orig;
    }
    
    // Normalisér energi
    for (var i = 0; i < G.ryttere.length; i++) {
        var r = G.ryttere[i];
        if (typeof r.energi !== "number") continue;
        var maxE = getMaxEnergi(r);
        if (r.energi > maxE) r.energi = maxE;
        if (r.energi < 0) r.energi = 0;
    }
    
    if (saveData.etapeFaerdig) {
        if (G.enr >= 20) {
            G.enr = 20;
            return 'slut';
        } else {
            G.enr++;
        }
    }
    
    return true;
}

function fortsaetSpil() {
    var result = indlaesGemtSpil();
    if (result === 'slut') {
        slut();
    } else if (result) {
        startEtape();
    } else {
        alert('Kunne ikke indlæse gemt spil');
        intro();
    }
}

// ========== TILPASSET startEtape() ==========
// Erstatter den originale. Tilføjer GT-tema og træthedsjusteret energi.

function startEtape() {
    requestWakeLock();
    G.etapeSlut = false;
    
    // Sørg for korrekt GT-tema
    setGTTema(G.aktuelGT);
    
    var e = G.etaper[G.enr];
    G.km = 0; G.tid = 0; G.msg = ""; G.vent = false; G.udata = null; G.lastMpResult = null;
    HOEJDEPUNKTER = [];
    G.profil = genP(e);
    G.mps = genMP(e);
    
    // Første etape i GT: sæt energi
    if (G.enr === 0) {
        var maxE = getMaxEnergi(G.spiller);
        
        // Træthed fra tidligere GT i sæsonen
        if (G.aktuelGTIdx > 0) {
            var tidligereGT = G.valgteGT[G.aktuelGTIdx - 1];
            var key = tidligereGT + "_" + G.aktuelGT;
            var traethed = GT_TRAETHED[key];
            if (traethed) {
                G.spiller.energi = Math.round(maxE * traethed.energiStart);
            } else {
                G.spiller.energi = maxE;
            }
        } else {
            G.spiller.energi = maxE;
        }
    }
    
    // Kuperede bjergspurt-fix
    if (e.type === "kuperet" && G.mps.length > 0) {
        var hoejestePunkt = 0;
        var hoejesteKm = 0;
        for (var ki = 0; ki < G.profil.length; ki++) {
            if (G.profil[ki] > hoejestePunkt) {
                hoejestePunkt = G.profil[ki];
                hoejesteKm = ki;
            }
        }
        for (var mi = 0; mi < G.mps.length; mi++) {
            if (G.mps[mi].type === "bjerg") {
                G.mps[mi].km = hoejesteKm;
                break;
            }
        }
        G.mps.sort(function(a, b) { return a.km - b.km; });
    }
    
    for (var i = 0; i < G.ryttere.length; i++) { G.ryttere[i].gi = 0; }
    
    // Dårlige dage (uændret logik)
    if (Math.random() < 0.10) {
        var maxE = getMaxEnergi(G.spiller);
        var pctTab = ri(5, 10);
        var raTab = maxE * (pctTab / 100);
        var energiFoer = G.spiller.energi;
        G.spiller.energi = Math.max(maxE * 0.5, G.spiller.energi - raTab);
        var faktiskTab = energiFoer - G.spiller.energi;
        var faktiskPct = Math.round((Math.abs(faktiskTab) / maxE) * 100);
        if (faktiskTab > 0 && faktiskPct >= 1) {
            G.msg = "😓 Du føler dig ikke helt frisk i dag... (-" + faktiskPct + "% energi)";
        }
    }
    
    if (e.type === "tt") startTT();
    else startNorm();
}

// ========== TILPASSET afslut() - RESTITUTION ==========
// I den originale afslut() og afslutTT(), erstat restitutions-beregningen.
// Find disse linjer:
//
//   var mult = r.sp ? getSvaerhedMultiplier() : 1.0;
//   var rest = (r.re / 100 * 28 + 12) * mult;
//   r.energi = Math.min(getMaxEnergi(r), r.energi + rest);
//
// Og erstat med:

function tilfoejRestitution() {
    for (var i = 0; i < G.ryttere.length; i++) {
        if (G.ryttere[i].ude) continue;
        var r = G.ryttere[i];
        var rest = beregnRestitution(r);
        r.energi = Math.min(getMaxEnergi(r), r.energi + rest);
    }
}

// ========== TILPASSET afslutTT() ==========
// Udskift restitutionslogikken og kald GT-specifikt

function afslutTT() {
    releaseWakeLock();
    clearInterval(G.iv);
    G.iv = null;
    G.etapeSlut = true;
    
    G.enkRes.push({ r: G.spiller, tid: G.sTid });
    G.enkRes.sort(function(a, b) { return a.tid - b.tid; });
    
    for (var i = 0; i < G.enkRes.length; i++) {
        G.enkRes[i].r.stid += G.enkRes[i].tid;
    }
    
    // Brug ny restitutionsfunktion
    tilfoejRestitution();
    
    gemEtapeHistorik(G.enkRes, true);
    visRes(G.enkRes, true);
}

// ========== TILPASSET afslut() (normal etape) ==========
// Kun ændringerne vises - resten er identisk med originalen.
// Erstat HELE afslut() med denne version der bruger GT-funktioner:

function afslut() {
    releaseWakeLock();
    clearInterval(G.iv);
    G.iv = null;
    G.etapeSlut = true;

    var e = G.etaper[G.enr];
    var info = ETYPER[e.type];
    var res = [];
    
    G.grp.sort(function(a, b) { return b.pos - a.pos; });
    var foererTid = e.dist * info.sek;
    
    for (var gi = 0; gi < G.grp.length; gi++) {
        var g = G.grp[gi];
        var gTid = foererTid + g.tf;
        var so = g.ryt.slice();
        so = so.filter(function(r) { return !r.ude; });
        
        if (e.type === "bjerg") so.sort(function(a,b) { return (b.bj + ri(-8,8)) - (a.bj + ri(-8,8)); });
        else so.sort(function(a,b) { return (b.spr + ri(-8,8)) - (a.spr + ri(-8,8)); });
        
        for (var i = 0; i < so.length; i++) {
            res.push({ r: so[i], tid: gTid, sprintPos: i });
        }
    }
    
    res = res.filter(function(x) { return !x.r.ude; });

    // Sikr alle aktive er med
    var resNavne = {};
    for (var i = 0; i < res.length; i++) resNavne[res[i].r.navn] = true;
    for (var i = 0; i < G.ryttere.length; i++) {
        var r = G.ryttere[i];
        if (!r.ude && !resNavne[r.navn]) {
            var sidsteTid = res.length > 0 ? res[res.length - 1].tid : foererTid;
            res.push({ r: r, tid: sidsteTid + 60, sprintPos: 999 });
        }
    }
    res.sort(function(a, b) { return a.tid - b.tid || a.sprintPos - b.sprintPos; });

    var vinderTid = res[0] ? res[0].tid : foererTid;
    
    // Tidsgrænse
    var tidsProcent;
    if (e.type === "bjerg") tidsProcent = 0.24;
    else if (e.type === "kuperet") tidsProcent = 0.22;
    else if (e.type === "tt") tidsProcent = 0.30;
    else tidsProcent = 0.12;
    var tidsGraense = vinderTid * tidsProcent;
    
    var udeRyttere = [];
    for (var i = 0; i < res.length; i++) {
        var x = res[i];
        var bagud = x.tid - vinderTid;
        if (bagud > tidsGraense && !x.r.ude) {
            x.r.ude = true;
            udeRyttere.push(x.r);
        }
    }
    
    // Bonus sekunder
    for (var i = 0; i < Math.min(3, res.length); i++) {
        if (!res[i].r.ude) res[i].r.stid -= BONUS[i];
    }
    
    // Sprint points
    if (e.type === "flad") {
        for (var i = 0; i < Math.min(SPR_PTS_FINISH.length, res.length); i++) {
            if (!res[i].r.ude) G.sprPts[res[i].r.navn] = (G.sprPts[res[i].r.navn]||0) + SPR_PTS_FINISH[i];
        }
    } else if (e.type === "kuperet") {
        var KUP_SPR = [25, 20, 16, 13, 11, 9, 7, 6, 5, 4, 3, 2, 1];
        for (var i = 0; i < Math.min(KUP_SPR.length, res.length); i++) {
            if (!res[i].r.ude) G.sprPts[res[i].r.navn] = (G.sprPts[res[i].r.navn]||0) + KUP_SPR[i];
        }
    }
    
    // Bjerg points
    if (e.type === "bjerg") {
        for (var i = 0; i < Math.min(BJG_PTS_FINISH.length, res.length); i++) {
            if (!res[i].r.ude) G.bjgPts[res[i].r.navn] = (G.bjgPts[res[i].r.navn]||0) + BJG_PTS_FINISH[i];
        }
    }

    // Dårlige dage / kollaps logning (uændret fra original)
    var vinderTidEtape = res[0] ? res[0].tid : 0;
    var gcFavoritter = [];
    for (var i = 0; i < res.length; i++) {
        if (res[i].r.gc > 82 && !res[i].r.ude) gcFavoritter.push(res[i]);
    }
    gcFavoritter.sort(function(a, b) { return a.tid - b.tid; });
    var favoritReferenceTid = gcFavoritter.length > 0 ? gcFavoritter[0].tid : vinderTidEtape;
    
    for (var i = 0; i < res.length; i++) {
        var r = res[i].r;
        if (r.ude || r.sp || r.gc <= 82) continue;
        var tidstabTilFavoritter = res[i].tid - favoritReferenceTid;
        var alleredeLogget = false;
        for (var hi = 0; hi < HOEJDEPUNKTER.length; hi++) {
            if ((HOEJDEPUNKTER[hi].type === "gc_kollaps" || HOEJDEPUNKTER[hi].type === "daarlig_dag") && HOEJDEPUNKTER[hi].data.rytter === r.navn) {
                alleredeLogget = true; break;
            }
        }
        if (alleredeLogget) continue;
        if (tidstabTilFavoritter > 600) {
            logHoejdepunkt("gc_kollaps", { rytter: r.navn, km: G.km, gc: r.gc, tidstab: tidstabTilFavoritter, energiKollaps: false });
        } else if (tidstabTilFavoritter > 240) {
            logHoejdepunkt("daarlig_dag", { rytter: r.navn, km: G.km, gc: r.gc, tidstab: tidstabTilFavoritter, energiKollaps: false });
        }
    }

    // Samlet tid
    for (var i = 0; i < res.length; i++) {
        if (!res[i].r.ude) res[i].r.stid += res[i].tid;
    }
    
    // Restitution med træthed
    tilfoejRestitution();

    gemEtapeHistorik(res, false);
    visRes(res, false, udeRyttere, vinderTid, tidsGraense);
}

// ========== TILPASSET visRes() ==========
// Bruger GT-tema til header og trøjer

function visRes(res, erTT, udeRyttere, vinderTid, tidsGraense) {
    gemSpil(true);
    var gt = getGT();
    
    G.gemtRes = res;
    G.gemtErTT = erTT;
    G.gemtUdeRyttere = udeRyttere;
    G.gemtVinderTid = vinderTid;
    G.gemtTidsGraense = tidsGraense;
    G.gemtResume = genererResume(res, erTT, udeRyttere);

    var e = G.etaper[G.enr];
    var vTid = res[0] ? res[0].tid : 0;
    var spi = -1;
    for (var i = 0; i < res.length; i++) { if (res[i].r.sp) { spi = i; break; } }
    
    var aktive = G.ryttere.filter(function(r) { return !r.ude; }).length;
    
    // GT badge + header
    var html = '<div style="text-align:center;margin-bottom:5px">' + gtBadgeHtml() + '</div>';

    html += '<p style="text-align:center;color:#888;font-size:11px;margin-top:10px">' + aktive + ' ryttere stadig i løbet</p>';
    
    // Knapper

        html += '<div class="box" style="text-align:center;border-color:#f44">' +
            '<h3 style="color:#f44">💀 ' + gt.loebNavn.toUpperCase() + ' ER SLUT FOR DIG</h3>' +
            '<p>' + G.navn + ' nåede ikke inden for tidsgrænsen.</p>' +

            '<button class="btn btn-big btn-r" onclick="spillerUdgaaet()">AFSLUT</button>' +
        '</div>';
    } else if (G.enr < 20) {
        html += '<div class="ctrls ctrls-3">' +
            '<button class="btn btn-big btn-y" onclick="visAlleResultater()">📋 ALLE</button>' +
            '<button class="btn btn-big" style="border-color:#3399ff;color:#3399ff" onclick="visResume()">📰 REFERAT</button>' +

    var gt = getGT()
	var gcS = aktive.slice().sort(function(a,b) { return a.stid - b.stid; });

    var bjS = aktive.slice().sort(function(a,b) { return (G.bjgPts[b.navn]||0) - (G.bjgPts[a.navn]||0); });
    
    var fTid = gcS[0] ? gcS[0].stid : 0;

	else { data = bjS; titel = gt.bjEmoji + " BJERG"; }

    for (var i = 0; i < data.length; i++) { if (data[i].sp) { spi = i; break; } }

var maxSpPts = 0;
for (var i = 0; i < aktive.length; i++) {

}

}

var spNavn = "-";
var bjNavn = "-";

if (maxSpPts > 0 && spS.length > 0) {

}

	var html = '<h2>STILLING - Etape ' + (G.enr + 1) + '</h2>';

        var val;
        if (G.stilTab === "gc") val = pos === 1 ? ft(r.stid) : '+' + ft(r.stid - fTid);

        else val = (G.bjgPts[r.navn] || 0) + ' pts';
        var j = "";

        if (pos === 1) {

            else if (G.stilTab === "sp") { j = gt.spEmoji + " "; visTal = false; }

    }

function slut() {
    var gt = getGT(); 
	var aktive = G.ryttere.filter(function(r) { return !r.ude; });
    var gcS = aktive.slice().sort(function(a,b) { return a.stid - b.stid; });
    var spS = aktive.slice().sort(function(a,b) { return (G.sprPts[b.navn]||0) - (G.sprPts[a.navn]||0); });
    var bjS = aktive.slice().sort(function(a,b) { return (G.bjgPts[b.navn]||0) - (G.bjgPts[a.navn]||0); });
    
    var fTid = gcS[0] ? gcS[0].stid : 0;
    var data, titel;
	if (G.stilTab === "gc") { data = gcS; titel = gt.gcEmoji + " SAMLET KLASSEMENT"; }
	else if (G.stilTab === "sp") { data = spS; titel = gt.spEmoji + " " + gt.spNavn.toUpperCase(); }
	else { data = bjS; titel = gt.bjEmoji + " " + gt.bjNavn.toUpperCase(); }
    
    var spiGC = -1;
    for (var i = 0; i < gcS.length; i++) { if (gcS[i].sp) { spiGC = i; break; } }

    for (var i = 0; i < data.length; i++) { if (data[i].sp) { spi = i; break; } }
    
    var msg = spiGC === 0 ? "🎉🎉 DU VANDT TOUREN! 🎉🎉"

        : spiGC <= 19 ? "👍 Top 20!"
        : "Du gennemførte!";
    
    var troeje = [];
    if (gcS[0] && gcS[0].sp) troeje.push("🟡 GUL TRØJE!");
    if (spS[0] && spS[0].sp) troeje.push("🟢 GRØN TRØJE!");
    if (bjS[0] && bjS[0].sp) troeje.push("🔴 PRIKKET TRØJE!");
    
    // Bonus for at gennemføre
    var bonusGennemfoer = G.spiller.ude ? 0 : gt.gennemfoer;

        bonusGC = gcPointTabel[spiGC];

	var bonusSp = (spS.length > 0 && spS[0].sp) ? gt.troeje : 0;

    var bonusTroeer = bonusSp + bonusBj;
    
    // Tæl etapesejre
    var etapeSejre = 0;

        if (ETAPE_HISTORIK[i].spiEtapePlads === 1) etapeSejre++;
    }
    var bonusSejre = etapeSejre;
    
    // Samlet bonus
    var bonusPoint = bonusGennemfoer + bonusGC + bonusTroeer + bonusSejre;

    var html = '<div style="text-align:center"><div style="font-size:50px">🏆</div><h1>TOUR DE FRANCE SLUT!</h1></div>' +
    '<div class="box" style="text-align:center;border-color:#ff0"><h2>' + msg + '</h2>' + (troeje.length > 0 ? '<div class="hl" style="margin-top:10px">' + troeje.join('<br>') + '</div>' : '') + '</div>' +
    '<div class="jerseys">' +
        '<div class="jersey jy">🟡 ' + (gcS[0] ? gcS[0].navn : "-") + '</div>' +
        '<div class="jersey jg">🟢 ' + (spS[0] ? spS[0].navn : "-") + ' (' + (G.sprPts[spS[0] ? spS[0].navn : ""]||0) + ')</div>' +
        '<div class="jersey jp">🔴 ' + (bjS[0] ? bjS[0].navn : "-") + ' (' + (G.bjgPts[bjS[0] ? bjS[0].navn : ""]||0) + ')</div>' +
    '</div>' +
    '<div class="tabs">' +
        '<div class="tab tab-gc ' + (G.stilTab==='gc'?'active':'') + '" onclick="G.stilTab=\'gc\';slut()">🟡 Samlet</div>' +
        '<div class="tab tab-sp ' + (G.stilTab==='sp'?'active':'') + '" onclick="G.stilTab=\'sp\';slut()">🟢 Sprint</div>' +
        '<div class="tab tab-bj ' + (G.stilTab==='bj'?'active':'') + '" onclick="G.stilTab=\'bj\';slut()">🔴 Bjerg</div>' +
    '</div>' +
    '<div class="box"><h3>' + titel + '</h3>';
    
    for (var i = 0; i < Math.min(15, data.length); i++) {
        var r = data[i];
        var pos = i + 1;
        var cls = r.sp ? "row pl" : "row";
        var prefix = "";
        var visTal = true;
        if (G.stilTab === "gc") {
            if (pos === 1) { prefix = "🥇 "; visTal = false; }
            else if (pos === 2) { prefix = "🥈 "; visTal = false; }
            else if (pos === 3) { prefix = "🥉 "; visTal = false; }
        } else if (G.stilTab === "sp") {
            if (pos === 1) { prefix = gt.spEmoji + " "; visTal = false; }
        } else if (G.stilTab === "bj") {
            if (pos === 1) { prefix = gt.bjEmoji + " "; visTal = false; }
        }
        var val;
        if (G.stilTab === "gc") val = pos === 1 ? ft(r.stid) : '+' + ft(r.stid - fTid);
        else if (G.stilTab === "sp") val = (G.sprPts[r.navn] || 0) + ' pts';
        else val = (G.bjgPts[r.navn] || 0) + ' pts';
        var numTxt = visTal ? pos + '. ' : '';
        html += '<div class="' + cls + '"><span>' + prefix + numTxt + r.navn + ' <span style="color:#666">' + r.holdAbbr + '</span></span><span>' + val + '</span></div>';
    }
    
    if (spi >= 15) {
        var r = data[spi];
        var val;
        if (G.stilTab === "gc") val = '+' + ft(r.stid - fTid);
        else if (G.stilTab === "sp") val = (G.sprPts[r.navn] || 0) + ' pts';
        else val = (G.bjgPts[r.navn] || 0) + ' pts';
        html += '<br><div class="row pl"><span>' + (spi+1) + '. ' + r.navn + '</span><span>' + val + ' </span></div>';
    }
    html += '</div>';
    
    // Gem trøjevindere til næste tour
    G.lastGcVinder = gcS[0] ? gcS[0].navn : null;
    G.lastSpVinder = spS[0] ? spS[0].navn : null;
    G.lastBjVinder = bjS[0] ? bjS[0].navn : null;

    // Gem bonus point til senere
    G.bonusPoint = bonusPoint;
    G.bonusGC = bonusGC;
    G.bonusTroeer = bonusTroeer;
    G.slutPlacering = spiGC + 1;
    
	html += gtSlutKnapper();
    
    R(html);
}

function addStat(stat) {
    if (G.bonusPoint <= 0) return;
    var r = G.spiller;
    if (stat === 'bj' && r.bj < 99) { r.bj++; G.bonusPoint--; }
    else if (stat === 'spr' && r.spr < 99) { r.spr++; G.bonusPoint--; }
    else if (stat === 'tt' && r.tt < 99) { r.tt++; G.bonusPoint--; }
    else if (stat === 'fl' && r.fl < 99) { r.fl++; G.bonusPoint--; }
    else if (stat === 'ud' && r.ud < 99) { r.ud++; G.bonusPoint--; }
    else if (stat === 're' && r.re < 99) { r.re++; G.bonusPoint--; }
    fordelPoint();
}

// ========== UTILITY (uændret) ==========

function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function rf(a, b) { return Math.random() * (b - a) + a; }
function sh(arr) { var a = arr.slice(); for (var i = a.length - 1; i > 0; i--) { var j = ri(0, i); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
function ft(s) { 
    s = Math.floor(Math.abs(s)); 
    var h = Math.floor(s/3600);
    var m = String(Math.floor((s%3600)/60)).padStart(2,"0");
    var sec = String(s%60).padStart(2,"0");
    return h + ":" + m + ":" + sec; 
}
function ec(e, m) { return (e/m) < 0.25 ? "low" : (e/m) < 0.5 ? "med" : ""; }
function $(id) { return document.getElementById(id); }
function R(h) { document.getElementById("game").innerHTML = erstatGTHtml(h); }
function findInArr(arr, fn) { for (var i = 0; i < arr.length; i++) { if (fn(arr[i])) return arr[i]; } return null; }
function findIdx(arr, fn) { for (var i = 0; i < arr.length; i++) { if (fn(arr[i])) return i; } return -1; }

function getSvaerhedMultiplier() {

function gemEtapeHistorik(res, erTT) {
    var etapeNr = G.enr + 1;
    for (var i = 0; i < ETAPE_HISTORIK.length; i++) {
        if (ETAPE_HISTORIK[i].etape === etapeNr) return;
    }
    var e = G.etaper[G.enr];
    var aktive = G.ryttere.filter(function(r) { return !r.ude; });
    var gcS = aktive.slice().sort(function(a,b) { return a.stid - b.stid; });
    var spS = aktive.slice().sort(function(a,b) { return (G.sprPts[b.navn]||0) - (G.sprPts[a.navn]||0); });
    var bjS = aktive.slice().sort(function(a,b) { return (G.bjgPts[b.navn]||0) - (G.bjgPts[a.navn]||0); });
    
    var spiEtapePlads = -1;
    for (var i = 0; i < res.length; i++) { if (res[i].r.sp) { spiEtapePlads = i + 1; break; } }
    var spiGCPlads = -1;
    for (var i = 0; i < gcS.length; i++) { if (gcS[i].sp) { spiGCPlads = i + 1; break; } }
    var spiSpPlads = -1;
    if ((G.sprPts[G.spiller.navn] || 0) > 0) {
        for (var i = 0; i < spS.length; i++) { if (spS[i].sp) { spiSpPlads = i + 1; break; } }
    }
    var spiBjPlads = -1;
    if ((G.bjgPts[G.spiller.navn] || 0) > 0) {
        for (var i = 0; i < bjS.length; i++) { if (bjS[i].sp) { spiBjPlads = i + 1; break; } }
    }
    var spLeder = (spS.length > 0 && (G.sprPts[spS[0].navn] || 0) > 0) ? spS[0].navn : null;
    var bjLeder = (bjS.length > 0 && (G.bjgPts[bjS[0].navn] || 0) > 0) ? bjS[0].navn : null;
    
    ETAPE_HISTORIK.push({

// ========== CANVAS TEGNING (tilpasset med GT-farver) ==========

function tegnP() {
    var c = $("cv");
    if (!c) return;
    c.width = c.parentElement.clientWidth - 4;
    c.height = 220;
    var ctx = c.getContext("2d");
    var gt = getGT();
    var e = G.etaper[G.enr];
    var p = G.profil;
    
    ctx.fillStyle = "#010";
    ctx.fillRect(0, 0, c.width, c.height);
    
    var maxH = Math.max.apply(null, p), minH = 0;
    maxH = maxH + 200;
    var rng = maxH - minH;
    if (rng < 1000) { maxH = 1000; rng = 1000; }

    var l = 8, b = 20, r = 12, t = 16;
    var w = c.width - l - r, h = c.height - b - t;
    
    // Profil-linje (GT-farve)
    ctx.beginPath();
    for (var i = 0; i < p.length; i++) {
        var x = l + (i / (p.length-1)) * w;
        var y = t + h - ((p[i] - minH) / rng) * h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = gt.primary;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.lineTo(l + w, t + h);
    ctx.lineTo(l, t + h);
    ctx.fillStyle = "rgba(100,100,0,0.3)";
    ctx.fill();
    
    // Mellempunkter
    if (G.mps) {
        for (var mi = 0; mi < G.mps.length; mi++) {
            var mp = G.mps[mi];
            var mx = l + (mp.km / e.dist) * w;
            ctx.strokeStyle = mp.type === "sprint" ? gt.spColor : gt.bjColor;
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(mx, t); ctx.lineTo(mx, t + h); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = mp.done ? "#666" : (mp.type === "sprint" ? gt.spColor : gt.bjColor);
            ctx.font = "16px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(mp.type === "sprint" ? gt.spEmoji : gt.bjEmoji, mx, t + 14);
        }
    }
    
    // Trøjebærere
    var aktiveRyttere = G.ryttere.filter(function(r) { return !r.ude; });
    var gcLeder = aktiveRyttere.slice().sort(function(a,b) { return a.stid - b.stid; })[0];
    var spLeder = aktiveRyttere.slice().sort(function(a,b) { return (G.sprPts[b.navn]||0) - (G.sprPts[a.navn]||0); })[0];
    var bjLeder = aktiveRyttere.slice().sort(function(a,b) { return (G.bjgPts[b.navn]||0) - (G.bjgPts[a.navn]||0); })[0];
    
    // Grupper på profil
    for (var i = 0; i < G.grp.length; i++) {
        var g = G.grp[i];
        var km = Math.min(g.pos, e.dist);
        var gx = l + (km / e.dist) * w;
        var idx = Math.min(Math.floor(km), p.length - 1);
        var gy = t + h - ((p[idx] - minH) / rng) * h;
        
        var farve = getGruppeFarve(g, G.spiller, gcLeder, spLeder, bjLeder);
        var col = farve.border;
        var her = g.ryt.indexOf(G.spiller) >= 0;
        var rad = her ? 16 : (g.type === "felt" ? 12 : 10);
        
        ctx.beginPath();
        ctx.arc(gx, gy - 16, rad, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.globalAlpha = her ? 0.3 : 0.5;
        ctx.fill();
        ctx.globalAlpha = 1.0;
        ctx.strokeStyle = col;
        ctx.lineWidth = her ? 4 : 2;
        ctx.stroke();
        
        ctx.fillStyle = "#fff";
        ctx.font = her ? "bold 13px monospace" : "11px monospace";
        ctx.textAlign = "center";
        ctx.fillText(g.ryt.length, gx, gy - 12);
    }
    
    // Mål
    ctx.strokeStyle = "#fff";
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(l + w, t); ctx.lineTo(l + w, t + h); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#fff";
    ctx.font = "20px sans-serif";
    ctx.fillText("🏁", l + w, t + 16);
    
    // Labels
    ctx.fillStyle = "#888";
    ctx.font = "11px monospace";
    ctx.textAlign = "left"; ctx.fillText("0km", l, t + h + 12);
    ctx.textAlign = "right"; ctx.fillText(e.dist + "km", l + w, t + h + 12);
    ctx.font = "10px monospace";
    ctx.textAlign = "left";
    ctx.fillText(Math.round(maxH) + "m", 8, t);
    ctx.fillText("0m", 8, t + h - 2);
}

// ========== TILPASSET tegnPlot() ==========
// Brug GT-farver i stedet for hardcoded

function tegnPlot(type) {
    var c = $("plotCanvas");
    if (!c) return;
    var gt = getGT();
    
    c.width = c.parentElement.clientWidth - 4;
    c.height = 320;
    var ctx = c.getContext("2d");
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, c.width, c.height);
    
    var l = 50, r = 20, t = 50, b = 50;
    var w = c.width - l - r, h = c.height - t - b;
    var etaper = ETAPE_HISTORIK.length;
    
    if (etaper === 0) {
        ctx.fillStyle = "#888"; ctx.font = "16px monospace"; ctx.textAlign = "center";
        ctx.fillText("Ingen data endnu", c.width / 2, c.height / 2);
        return;
    }
    
    // Akser
    ctx.strokeStyle = "#444"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(l, t); ctx.lineTo(l, t + h); ctx.lineTo(l + w, t + h); ctx.stroke();
    
    if (type === "etaper") {
        // Søjlediagram (uændret fra original)
        ctx.fillStyle = gt.primary; ctx.font = "bold 14px monospace"; ctx.textAlign = "center";
        ctx.fillText("Dine etaperesultater", c.width / 2, 20);
        
        var kategorier = [
            { navn: "1.", count: 0, farve: gt.gcColor },
            { navn: "2.", count: 0, farve: "#ccc" },
            { navn: "3.", count: 0, farve: "#cd7f32" },
            { navn: "4-10", count: 0, farve: "#0f0" },
            { navn: "11-20", count: 0, farve: "#0aa" },
            { navn: "21-50", count: 0, farve: "#a6f" },
            { navn: "Andre", count: 0, farve: "#666" }
        ];
        for (var i = 0; i < etaper; i++) {
            var plads = ETAPE_HISTORIK[i].spiEtapePlads;
            if (plads === 1) kategorier[0].count++;
            else if (plads === 2) kategorier[1].count++;
            else if (plads === 3) kategorier[2].count++;
            else if (plads <= 10) kategorier[3].count++;
            else if (plads <= 20) kategorier[4].count++;
            else if (plads <= 50) kategorier[5].count++;
            else kategorier[6].count++;
        }
        var maxCount = 1;
        for (var i = 0; i < kategorier.length; i++) { if (kategorier[i].count > maxCount) maxCount = kategorier[i].count; }
        var barW = Math.floor(w / kategorier.length) - 10;
        var gap = (w - (barW * kategorier.length)) / (kategorier.length + 1);
        
        for (var i = 0; i < kategorier.length; i++) {
            var kat = kategorier[i];
            var barH = (kat.count / maxCount) * h;
            var x = l + gap + i * (barW + gap);
            var y = t + h - barH;
            if (kat.count > 0) {
                ctx.fillStyle = kat.farve;
                ctx.fillRect(x, y, barW, barH);
                ctx.fillStyle = barH > 20 ? "#000" : "#fff";
                ctx.font = "bold 12px monospace"; ctx.textAlign = "center";
                ctx.fillText(kat.count, x + barW / 2, barH > 20 ? y + 15 : y - 5);
            }
            ctx.fillStyle = kat.farve; ctx.font = "10px monospace"; ctx.textAlign = "center";
            ctx.fillText(kat.navn, x + barW / 2, t + h + 15);
        }
    } else {
        // Linjegraf for trøjeplacering
        var plotFarve, plotEmoji, plotNavn, pladsKey, lederKey;
        if (type === "gc") { plotFarve = gt.gcColor; plotEmoji = gt.gcEmoji; plotNavn = gt.gcNavn; pladsKey = "spiGCPlads"; lederKey = "gcLeder"; }
        else if (type === "groen") { plotFarve = gt.spColor; plotEmoji = gt.spEmoji; plotNavn = gt.spNavn; pladsKey = "spiSpPlads"; lederKey = "spLeder"; }
        else { plotFarve = gt.bjColor; plotEmoji = gt.bjEmoji; plotNavn = gt.bjNavn; pladsKey = "spiBjPlads"; lederKey = "bjLeder"; }
        
        ctx.fillStyle = plotFarve; ctx.font = "bold 14px monospace"; ctx.textAlign = "center";
        ctx.fillText("Din placering (" + plotNavn + ")", c.width / 2, 20);
        
        var maxPlads = 1;
        for (var i = 0; i < etaper; i++) { var p2 = ETAPE_HISTORIK[i][pladsKey]; if (p2 && p2 > maxPlads) maxPlads = p2; }
        maxPlads = Math.min(Math.ceil(maxPlads / 5) * 5 + 5, 50);
        
        var dageITroeje = 0;
        for (var i = 0; i < etaper; i++) { if (ETAPE_HISTORIK[i][lederKey] === G.spiller.navn) dageITroeje++; }
        
        // Y-labels
        ctx.fillStyle = "#888"; ctx.font = "10px monospace"; ctx.textAlign = "right";
        ctx.fillText("1", l - 5, t + 10);
        ctx.fillText(maxPlads, l - 5, t + h - 5);
        
        // Gitter
        ctx.strokeStyle = "#222"; ctx.lineWidth = 1;
        for (var i = 1; i < 5; i++) { var gy = t + (h/5)*i; ctx.beginPath(); ctx.moveTo(l,gy); ctx.lineTo(l+w,gy); ctx.stroke(); }
        
        // Linje
        ctx.strokeStyle = plotFarve; ctx.lineWidth = 3; ctx.beginPath();
        var harData = false;
        for (var i = 0; i < etaper; i++) {
            var plads = ETAPE_HISTORIK[i][pladsKey];
            if (!plads || plads <= 0) continue;
            var x = l + (i / (etaper - 1 || 1)) * w;
            var y = t + ((plads - 1) / (maxPlads - 1)) * h;
            if (!harData) { ctx.moveTo(x, y); harData = true; } else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        // Punkter
        for (var i = 0; i < etaper; i++) {
            var plads = ETAPE_HISTORIK[i][pladsKey];
            if (!plads || plads <= 0) continue;
            var x = l + (i / (etaper - 1 || 1)) * w;
            var y = t + ((plads - 1) / (maxPlads - 1)) * h;
            var barTroeje = ETAPE_HISTORIK[i][lederKey] === G.spiller.navn;
            ctx.fillStyle = barTroeje ? plotFarve : (plads <= 3 ? "#f80" : plads <= 10 ? "#0f0" : "#0aa");
            ctx.beginPath(); ctx.arc(x, y, barTroeje ? 8 : 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "9px monospace"; ctx.textAlign = "center";
            ctx.fillText(plads, x, y - 12);
        }
        
        // X-labels
        ctx.fillStyle = "#888"; ctx.font = "9px monospace"; ctx.textAlign = "center";
        ctx.fillText("1", l, t + h + 15);
        ctx.fillText(etaper, l + w, t + h + 15);
        ctx.fillText("Etape", l + w / 2, c.height - 5);
        
        var slutPlads = ETAPE_HISTORIK[etaper - 1][pladsKey];
        var legendHtml = slutPlads && slutPlads > 0 
            ? 'Slutplacering: <span style="color:' + plotFarve + ';font-weight:bold">' + slutPlads + '. plads</span>'
            : 'Slutplacering: <span style="color:#888">Ingen placering</span>';
        if (dageITroeje > 0) legendHtml += ' · <span style="color:' + plotFarve + '">' + plotEmoji + ' ' + dageITroeje + ' dage</span>';
        $("plotLegend").innerHTML = legendHtml;
    }
}
